<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibecoding for Granola Teams</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-dark: #0F6E56; --red: #A32D2D;
    --bg: #f8f8f6; --bg2: #f1f0ed; --bg3: #e8e7e3;
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --success-bg: #e8f5ef; --success-border: rgba(29,158,117,0.4); --success-text: #0F6E56;
    --danger-bg: #fce8e8; --danger-border: rgba(163,45,45,0.4); --danger-text: #A32D2D;
    --info-bg: #e8f0fb; --info-text: #1a4fa0;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0f0ec; --text2: #a0a09a; --text3: #666662;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --success-bg: #0d2e20; --success-text: #4dd4a0;
      --danger-bg: #2e1212; --danger-text: #f08080;
      --info-bg: #0d1f3c; --info-text: #7aabf5;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-size: 14px; line-height: 1.6; }

  /* SIDEBAR */
  #sidebar { width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 14px 14px 10px; }
  #sidebar-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  #sidebar-progress-label { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  #progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  #progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; width: 0%; }
  #nav { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
  .nav-btn { display: flex; align-items: flex-start; gap: 7px; width: 100%; padding: 5px 7px; border-radius: var(--radius); border: none; cursor: pointer; text-align: left; background: transparent; margin-bottom: 1px; transition: background 0.15s; }
  .nav-btn:hover { background: var(--bg3); }
  .nav-btn.active { background: var(--bg3); }
  .nav-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; background: var(--bg3); color: var(--text3); }
  .nav-dot.done { background: var(--green); color: #fff; }
  .nav-dot.active { background: var(--info-bg); color: var(--info-text); }
  .nav-label { font-size: 11px; font-weight: 400; color: var(--text2); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-btn.active .nav-label { font-weight: 600; color: var(--text); }
  #glossary-btn { margin: 8px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 11px; color: var(--text2); text-align: left; width: calc(100% - 16px); border-top: 0.5px solid var(--border); margin-top: 0; border-radius: 0; border-left: none; border-right: none; border-bottom: none; padding: 10px 14px; }
  #glossary-btn:hover { background: var(--bg3); }

  /* MAIN */
  #main { flex: 1; overflow-y: auto; padding: 28px 32px; }
  #content { max-width: 660px; margin: 0 auto; }
  #chapter-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  #chapter-title { font-size: 21px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  #chapter-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 18px; }

  /* TABS */
  #tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 18px; }
  .tab-btn { padding: 6px 14px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 400; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-btn.active { font-weight: 600; color: var(--text); border-bottom-color: var(--green); }

  /* LESSON */
  #granola-callout { background: var(--bg2); border-left: 3px solid var(--green); border-radius: 0 var(--radius) var(--radius) 0; padding: 10px 14px; margin-bottom: 14px; }
  #granola-callout-label { font-size: 10px; font-weight: 600; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  #granola-text { font-size: 13px; color: var(--text); line-height: 1.65; }
  #lesson-content { font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 14px; white-space: pre-line; }
  .table-wrap { overflow-x: auto; margin-bottom: 16px; }
  .table-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 10px; background: var(--bg2); border-bottom: 0.5px solid var(--border2); color: var(--text2); font-weight: 600; white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 0.5px solid var(--border); color: var(--text2); vertical-align: top; line-height: 1.5; }
  td:first-child { color: var(--text); }
  #rec-box { background: var(--bg); border: 0.5px solid var(--green); border-radius: var(--radius-lg); padding: 11px 14px; margin-bottom: 14px; }
  #rec-label { font-size: 10px; font-weight: 600; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  #rec-text { font-size: 13px; color: var(--text); line-height: 1.65; }
  #key-term-box { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 18px; }
  #key-term-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  #key-term-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  #key-term-def { font-size: 12px; color: var(--text2); line-height: 1.6; }
  #ask-claude-btn { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 12px; color: var(--text2); margin-bottom: 18px; }
  #ask-claude-btn:hover { background: var(--bg2); }
  #claude-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 18px; }
  #claude-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  #claude-text { font-size: 13px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
  #lesson-nav { display: flex; justify-content: space-between; }
  .nav-arrow { padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 12px; color: var(--text2); }
  .nav-arrow:disabled { color: var(--text3); cursor: not-allowed; }
  .nav-arrow:not(:disabled):hover { background: var(--bg2); }
  #quiz-btn { padding: 7px 18px; border: none; border-radius: var(--radius); background: var(--green); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; }
  #quiz-btn:hover { background: var(--green-dark); }

  /* QUIZ */
  #q-dots { display: flex; gap: 5px; margin-bottom: 18px; align-items: center; }
  .q-dot { height: 7px; border-radius: 4px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; background: var(--bg3); width: 7px; }
  .q-dot.active { width: 26px; background: var(--border2); }
  .q-dot.correct { background: var(--green); }
  .q-dot.wrong { background: var(--red); }
  #q-counter { font-size: 11px; color: var(--text3); margin-left: 4px; }
  #q-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; line-height: 1.55; }
  #q-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .q-opt { padding: 10px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); cursor: pointer; font-size: 13px; color: var(--text); text-align: left; line-height: 1.5; transition: all 0.15s; }
  .q-opt:not(.answered):hover { background: var(--bg2); }
  .q-opt.correct { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); cursor: default; }
  .q-opt.wrong { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); cursor: default; }
  .q-opt.answered { cursor: default; }
  #q-feedback { padding: 10px 14px; border-radius: var(--radius); margin-bottom: 16px; display: none; }
  #q-feedback.correct { background: var(--success-bg); display: block; }
  #q-feedback.wrong { background: var(--danger-bg); display: block; }
  #q-feedback-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  #q-feedback.correct #q-feedback-title { color: var(--success-text); }
  #q-feedback.wrong #q-feedback-title { color: var(--danger-text); }
  #q-feedback-exp { font-size: 12px; color: var(--text2); line-height: 1.6; }
  #quiz-nav { display: flex; justify-content: space-between; align-items: center; }
  #back-to-lesson { padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 12px; color: var(--text2); }
  #back-to-lesson:hover { background: var(--bg2); }
  #quiz-actions { display: flex; gap: 8px; }
  .quiz-action-btn { padding: 7px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; color: #fff; }
  #next-q-btn { background: var(--green); display: none; }
  #next-q-btn:hover { background: var(--green-dark); }
  #next-ch-btn { background: var(--green-dark); display: none; }
  #next-ch-btn:hover { opacity: 0.9; }
  #complete-msg { font-size: 13px; color: var(--green); font-weight: 600; padding: 7px 0; display: none; }

  /* GLOSSARY MODAL */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; }
  #overlay.open { display: flex; }
  #glossary-modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 560px; max-height: 82vh; overflow: hidden; display: flex; flex-direction: column; }
  #glossary-header { padding: 14px 18px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  #glossary-header span { font-size: 15px; font-weight: 600; color: var(--text); }
  #close-glossary { border: none; background: transparent; cursor: pointer; font-size: 20px; color: var(--text3); line-height: 1; }
  #glossary-list { overflow-y: auto; padding: 8px 18px 16px; }
  .gloss-item { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .gloss-term { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .gloss-def { font-size: 12px; color: var(--text2); line-height: 1.6; }

  /* MOBILE */
  @media (max-width: 680px) {
    #sidebar { display: none; }
    #main { padding: 16px; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">Vibecoding for Granola</div>
    <div id="sidebar-progress-label">0/20 complete · 0%</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <div id="nav"></div>
  <button id="glossary-btn" onclick="openGlossary()">Glossary (all 20 key terms)</button>
</div>

<div id="main">
  <div id="content">
    <div id="chapter-label"></div>
    <div id="chapter-title"></div>
    <div id="chapter-subtitle"></div>
    <div id="tabs">
      <button class="tab-btn active" onclick="setView('lesson')">Lesson</button>
      <button class="tab-btn" id="quiz-tab-btn" onclick="setView('quiz')">Quiz</button>
    </div>

    <!-- LESSON VIEW -->
    <div id="lesson-view">
      <div id="granola-callout">
        <div id="granola-callout-label">Granola in the real world</div>
        <div id="granola-text"></div>
      </div>
      <div id="lesson-content"></div>
      <div id="tables-container"></div>
      <div id="rec-box" style="display:none">
        <div id="rec-label">Handbook recommendation</div>
        <div id="rec-text"></div>
      </div>
      <div id="key-term-box">
        <div id="key-term-label">Key term</div>
        <div id="key-term-name"></div>
        <div id="key-term-def"></div>
      </div>
      <button id="ask-claude-btn" onclick="askClaude()">Ask Claude for a deeper explanation ↗</button>
      <div id="claude-box" style="display:none">
        <div id="claude-label">Claude's explanation</div>
        <div id="claude-text">Thinking...</div>
      </div>
      <div id="lesson-nav">
        <button class="nav-arrow" id="prev-btn" onclick="prevChapter()">← Previous</button>
        <button id="quiz-btn" onclick="setView('quiz')">Take quiz →</button>
      </div>
    </div>

    <!-- QUIZ VIEW -->
    <div id="quiz-view" style="display:none">
      <div id="q-dots"></div>
      <div id="q-text"></div>
      <div id="q-options"></div>
      <div id="q-feedback">
        <div id="q-feedback-title"></div>
        <div id="q-feedback-exp"></div>
      </div>
      <div id="quiz-nav">
        <button id="back-to-lesson" onclick="setView('lesson')">← Back to lesson</button>
        <div id="quiz-actions">
          <button class="quiz-action-btn" id="next-q-btn" onclick="nextQuestion()">Next question →</button>
          <button class="quiz-action-btn" id="next-ch-btn" onclick="nextChapter()">Next chapter →</button>
          <div id="complete-msg">Course complete! 🎉</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- GLOSSARY MODAL -->
<div id="overlay" onclick="closeGlossary()">
  <div id="glossary-modal" onclick="event.stopPropagation()">
    <div id="glossary-header">
      <span>Handbook Glossary</span>
      <button id="close-glossary" onclick="closeGlossary()">✕</button>
    </div>
    <div id="glossary-list"></div>
  </div>
</div>

<script>
const G="#1D9E75",GD="#0F6E56";

const MODULES=[
  {id:"I",title:"Before we begin",subtitle:"Who this book is for and how to read it",
   granola:"You use Granola daily — but what actually powers it? This course maps the entire JS ecosystem to Granola's real architecture, chapter by chapter, directly from the Vibe Coder's Handbook.",
   content:"The web dev ecosystem in 2026 is genuinely confusing — even for experienced developers. Over 2.5 million packages exist on npm. Tutorials from two years ago are already outdated.\n\nThis book fixes that. It won't teach you to code. It teaches you what every major tool does, which ones are interchangeable (either/or choices), and which ones work together.\n\nThe four audiences:\n• Vibe coders — building with AI, want to understand what it generated\n• Returning developers — left coding, came back to an unrecognizable ecosystem\n• Managers and founders — want to speak their dev team's language\n• Students and curious minds — want the map before the tutorials\n\nThink of this book as the map. The learning resources at the end of each chapter are the driving lessons.",
   keyTerm:"Vibe coding",keyTermDef:"Building software by describing it to AI in natural language. The AI generates real, custom, editable, deployable source code — not templates or drag-and-drop.",
   rec:null,tables:[],
   quizzes:[
    {q:"What does this handbook teach — and what does it explicitly NOT teach?",opts:["It teaches you to write code from scratch","It teaches what every major tool does and how tools relate — not how to code","It teaches you to use specific AI tools like Cursor and Bolt","It teaches database design and SQL"],a:1,exp:"'We will not teach you how to code… Instead, we will teach you what every major tool in the ecosystem does, which ones are interchangeable, and which ones work together.'"},
    {q:"What is the difference between an 'either/or' tool choice and tools that 'work together'?",opts:["Either/or tools are free; working-together tools require payment","Either/or tools do the same job — you pick one. Tools that work together do different jobs and are used simultaneously","Either/or tools are for beginners; working-together tools are for advanced developers","There is no meaningful difference — all tools can be combined"],a:1,exp:"The core framework of the book: 'which ones are interchangeable (either/or choices), and which ones work together.' React OR Vue (same job). But React AND Tailwind AND Zod work together (different jobs)."},
    {q:"The handbook uses a map analogy. What does the 'map' represent, and what are the 'driving lessons'?",opts:["The map is the code; the driving lessons are the tutorials","The map is this book (understanding what tools exist); the driving lessons are the tutorials (hands-on coding)","The map is the Master Map table; the driving lessons are the quiz questions","The map is GitHub; the driving lessons are deployment platforms"],a:1,exp:"'Think of this book as the map, and those tutorials as the driving lessons.' The book gives you orientation; tutorials give you hands-on practice."},
   ]},
  {id:1,title:"How the web actually works",subtitle:"Frontend, backend, databases, and the three languages",
   granola:"Granola has all three layers: a desktop/web frontend you interact with, a backend server handling auth and syncing, and a database storing your notes. Every 'Chat with meeting' click involves all three layers working together.",
   content:"Every web app ever built — from Google to a personal blog — has exactly three layers. No exceptions.\n\nThe Restaurant Analogy: The frontend is the dining room (what customers see and touch). The backend is the kitchen (where orders are processed). The database is the pantry and recipe book (all ingredients and knowledge stored permanently).\n\nCritical insight: Every tool in this book eventually produces HTML, CSS, and JavaScript. React produces HTML and JS. Tailwind produces CSS. TypeScript compiles to JS. The browser never sees React or Tailwind.\n\nCLIENT VS SERVER\n• Client (Frontend): The user's device and browser. Anyone can view it using dev tools. Never trust it for security.\n• Server (Backend): A computer in a data center. Code here is hidden from users. Handles sensitive operations: checking passwords, charging credit cards, accessing databases.",
   keyTerm:"HTTP request-response cycle",keyTermDef:"The browser asks (request) and the server responds (response). Every click, every page load — this cycle happens underneath. It is the heartbeat of every web application.",
   rec:"When you feel lost with any tool, ask: is this a dining room thing (frontend), a kitchen thing (backend), or a pantry thing (database)?",
   tables:[
    {title:"The three layers of every web app",headers:["Layer","What It Does","Where It Runs"],rows:[["Frontend","Everything the user sees and interacts with: buttons, forms, pages, images, animations","In the user's browser"],["Backend","Hidden logic: processes requests, handles security, authenticates users, talks to the database","On a server (a computer in a data center)"],["Database","Stores all persistent data: user accounts, posts, orders, settings, files, logs","On a server (often a managed service)"]]},
    {title:"The three languages of the web",headers:["Language","Job","Real-World Analogy"],rows:[["HTML","Defines structure and content: headings, paragraphs, buttons, forms, images","The blueprint of a building: where walls, doors, windows go"],["CSS","Defines how everything looks: colors, fonts, spacing, layout, shadows, animations","Interior design: paint colors, furniture, lighting"],["JavaScript","Defines how things behave: what happens on click, how data moves, how the page updates","Electrical and plumbing: what makes things actually work"]]}
   ],
   quizzes:[
    {q:"Which layer handles sensitive operations like checking passwords — and why?",opts:["Frontend — it's closest to the user","Backend — code there is hidden from users and can't be inspected via dev tools","Database — it stores the password data","Any layer — security doesn't depend on location"],a:1,exp:"'Server (Backend): Code that runs here is hidden from users. It handles sensitive operations: checking passwords, charging credit cards, accessing databases.' Frontend code can be viewed by anyone in browser dev tools."},
    {q:"In the restaurant analogy, what does the DATABASE represent?",opts:["The dining room — it's what customers interact with","The kitchen — it processes all the orders","The pantry and recipe book — it stores all ingredients and knowledge permanently","The waiter — it connects the customer to the kitchen"],a:2,exp:"'The database is the pantry and recipe book: where all the ingredients and knowledge are stored permanently.' When the backend (kitchen) needs to look something up, it goes to the database (pantry)."},
    {q:"When your AI generates a React project with Tailwind, does the browser ever see React or Tailwind code?",opts:["Yes — modern browsers understand React natively","Yes — Tailwind is just regular CSS that browsers understand","No — these tools compile down to HTML, CSS, and JavaScript before the browser sees anything","Only if you enable a special browser extension"],a:2,exp:"'The browser never sees React or Tailwind. It only sees the HTML, CSS, and JavaScript they generate.' These tools are development abstractions that produce the three browser languages as output."},
    {q:"What are the three languages every browser understands — and what is each one's job?",opts:["HTML (structure), Python (logic), CSS (appearance)","JavaScript (structure), TypeScript (safety), CSS (appearance)","HTML (structure), CSS (appearance), JavaScript (behaviour)","React (UI), Node.js (server), SQL (data)"],a:2,exp:"HTML defines structure, CSS defines appearance, JavaScript defines behaviour. These are the only three languages browsers natively understand."},
    {q:"Granola needs to check a user's subscription before showing content. Which layer handles this?",opts:["Frontend — it's displayed in the UI","Backend — subscription checks are business logic enforced server-side","Database — it can query itself directly","All three simultaneously"],a:1,exp:"Subscription checking is business logic and a security decision — it must run on the backend. 'Never trust client-side code for security.' A user could bypass a frontend-only check using browser dev tools."},
   ]},
  {id:2,title:"JavaScript and TypeScript",subtitle:"The language, the upgrade, and why TypeScript won",
   granola:"Granola's entire codebase is TypeScript. It's the default for any serious project — what Granola engineers use for the desktop app, the backend, and every tool in between.",
   content:"JavaScript is the only programming language that browsers understand natively. No other language has this privilege.\n\nTypeScript is JavaScript with a safety net. It adds one transformative feature: static types.\n\nThe Problem: In JavaScript, you might write let price = 29.99, then accidentally assign price = \"free\" somewhere else. JavaScript won't complain. Three files later, price * 1.1 returns NaN instead of tax. Finding where price became a string can take hours.\n\nTypeScript prevents this. The compiler shows a red squiggly line immediately when types mismatch.\n\nImportant: TypeScript does NOT run in browsers or on servers. It compiles to regular JavaScript before deployment. Types are completely stripped away — they exist only during development.\n\nThe Either/Or Decision: Use TypeScript for any project you plan to maintain. Use JavaScript only for throwaway scripts or learning exercises.",
   keyTerm:"Static typing",keyTermDef:"Declaring what type of data a variable holds (number, string, object) so the compiler catches mismatches before the code ever runs. TypeScript's core feature — bugs found in your editor, not in production by real users.",
   rec:"Use TypeScript for any project you plan to maintain. Use JavaScript only for throwaway scripts, quick experiments, or learning exercises.",
   tables:[{title:"JavaScript vs TypeScript",headers:["Factor","JavaScript","TypeScript"],rows:[["Bug prevention","Bugs found at runtime (in production, by users)","Bugs caught at compile time (in your editor, before deployment)"],["Editor support","Basic autocomplete","Rich autocomplete, inline docs, safe refactoring, jump-to-definition"],["Team collaboration","Hard to know data shape without reading all the code","Types serve as living documentation that can never go out of date"],["AI coding tools","AI has less context, generates less accurate code","Types give AI much better understanding, leading to fewer errors"],["Codebase size","Fine for small projects","Essential for large codebases; helpful at any size"]]}],
   quizzes:[
    {q:"TypeScript catches bugs at compile time. What does this mean practically?",opts:["Bugs are caught when the app is deployed to production","Bugs are caught in your editor before you ever run the code","Bugs are caught when users report them","Bugs are caught only during automated tests"],a:1,exp:"'Bugs caught at compile time (in your editor, before deployment)' — TypeScript shows a red squiggly line immediately when types mismatch. Contrast with JavaScript where 'Bugs found at runtime (in production, by users).'"},
    {q:"Does TypeScript run in the browser? What happens to types when code is deployed?",opts:["Yes — modern browsers support TypeScript natively","No — TypeScript compiles to JavaScript; types are completely stripped away before deployment","Yes — but only in Chrome and Firefox","No — TypeScript runs only on the server via Node.js"],a:1,exp:"'TypeScript gets compiled into regular JavaScript before deployment. The types are completely stripped away. They exist only during development. The browser never sees a single TypeScript type declaration.'"},
    {q:"According to the comparison table, how does TypeScript help AI coding tools?",opts:["AI tools were built by the TypeScript team","Types give AI much better understanding of your codebase, leading to fewer errors","AI tools run TypeScript natively and can't use JavaScript","TypeScript automatically fixes AI-generated bugs"],a:1,exp:"From the table: 'AI coding tools — TypeScript: Types give AI much better understanding, leading to fewer errors.' vs 'JavaScript: AI has less context to generate accurate code.' Directly relevant to vibecoding."},
    {q:"When should you use JavaScript instead of TypeScript?",opts:["When you want faster runtime performance","For throwaway scripts, quick experiments, or learning exercises — not for projects you plan to maintain","When your team is more comfortable with it","When deploying to Vercel — it only supports JavaScript"],a:1,exp:"'Use TypeScript for any project you plan to maintain. Use JavaScript only for throwaway scripts, quick experiments, or learning exercises.' TypeScript has no runtime performance difference — types are stripped before the code runs."},
    {q:"You're building a long-term Granola integration tool. Which language and why?",opts:["JavaScript — simpler and faster to write","TypeScript — types serve as living documentation, catches bugs before deployment, gives AI better context","Either — the choice doesn't matter","Python — easier for non-developers to read"],a:1,exp:"For a maintained project: TypeScript. The table shows: 'Team collaboration: Types serve as living documentation that can never go out of date.' Plus bugs caught before deployment rather than in production."},
   ]},
  {id:3,title:"Node.js and the runtime",subtitle:"Running JavaScript outside the browser, npm, packages",
   granola:"Granola's backend runs on Node.js. When you hit 'Chat with this meeting' and Granola queries your notes, calls an AI model, and returns results — that's Node.js executing server-side JavaScript.",
   content:"Node.js lets you run JavaScript outside of a browser — on servers, laptops, anywhere.\n\nBefore Node.js, JavaScript was trapped inside the browser. Backend work required PHP, Java, Python, Ruby. Node.js enabled 'JavaScript everywhere' — one language for both frontend AND backend.\n\nNode.js is not a framework, not a library, not a language. It is a RUNTIME: an environment where JavaScript code executes. Everything else (React, Express, Next.js, Drizzle) runs on top of this engine.\n\nnpm (Node Package Manager): Think of npm as an app store for code. Over 2.5 million packages available. 'npm install react' downloads React and its dependencies into a folder called node_modules.\n\npackage.json: Every project has one — the project's ID card:\n• 'dependencies' — packages the app needs in production\n• 'devDependencies' — packages needed only during development (like TypeScript itself — types are stripped at build time, so TypeScript isn't needed in production)",
   keyTerm:"Runtime",keyTermDef:"An environment where code executes. Node.js is the runtime that lets JavaScript run outside browsers, on servers. Everything else in the ecosystem (React, Express, Next.js, Drizzle) runs on top of Node.js.",
   rec:"If starting out, use npm — it comes free with Node.js and every tutorial uses it. Consider pnpm or Bun only when you have a specific reason, like saving disk space across many projects.",
   tables:[{title:"Package manager comparison",headers:["Manager","Speed","Disk Usage","Key Feature","Best For"],rows:[["npm","Standard","Standard","Comes with Node.js, universal compatibility","Beginners, max compatibility"],["pnpm","2x faster","70% less","Content-addressable store (each package stored once across all projects)","Professional devs, monorepos"],["Yarn Berry","Fast","No node_modules (PnP mode)","Plug'n'Play — eliminates node_modules entirely","Teams wanting zero-install workflows"],["Bun","3–5x faster","Standard","All-in-one: runtime + bundler + package manager","Speed-obsessed developers"]]}],
   quizzes:[
    {q:"What exactly is Node.js — is it a framework, a library, or a language?",opts:["A framework — it structures how you build backends","A library — it adds features to JavaScript","A language — it is a different version of JavaScript","A runtime — an environment where JavaScript executes outside the browser"],a:3,exp:"'Node.js is not a framework, not a library, and not a language. It is a runtime: an environment where JavaScript code executes.' Everything else (React, Express, Next.js) is built to run on top of it."},
    {q:"What is the difference between 'dependencies' and 'devDependencies' in package.json?",opts:["They are the same — the distinction is cosmetic","dependencies are needed in production; devDependencies are needed only during development and excluded from production builds","dependencies are optional; devDependencies are required","dependencies are for the frontend; devDependencies are for the backend"],a:1,exp:"'dependencies: packages the app needs to run in production' vs 'devDependencies: packages needed only during development, like TypeScript itself.' TypeScript is a devDependency because types are stripped before production."},
    {q:"pnpm uses 70% less disk space than npm. What specific feature makes this possible?",opts:["It compresses packages with gzip automatically","It only installs packages when they're first used","Content-addressable store — each package stored once and shared across all projects on your computer","It skips downloading documentation and type definitions"],a:2,exp:"pnpm's key feature is 'Content-addressable store (each package stored once)' — if 10 projects all use React, npm downloads React 10 times; pnpm stores it once and links to it."},
    {q:"Bun is described as 'all-in-one.' What three things does it combine?",opts:["Editor + debugger + package manager","Runtime + bundler + package manager","Database + server + package manager","Linter + formatter + package manager"],a:1,exp:"Bun's key feature is 'All-in-one runtime + bundler + package manager.' It replaces Node.js (runtime), Vite (bundler), AND npm (package manager) in a single tool."},
    {q:"When you run 'npm install' in a shared project, what happens and why?",opts:["It creates a new project from scratch","It reads package.json and downloads all listed dependencies into node_modules — because node_modules is excluded from Git","It uploads your code to npm's servers","It checks for security vulnerabilities"],a:1,exp:"'When someone shares a project with you, they do not include the node_modules folder (it is too large and is listed in .gitignore). Instead, you run \"npm install\" and npm reads the package.json to download everything fresh.'"},
   ]},
  {id:4,title:"Frontend frameworks",subtitle:"React, Vue, Angular, Svelte: what they do and how to choose",
   granola:"Granola's desktop interface is built in React. Every element — the notepad, sidebar, Spaces panel, live transcript — is a React component. React's automatic UI updates make real-time transcription feel seamless.",
   content:"A frontend framework solves one hard problem: keeping your UI in sync with your data automatically. Without one, you'd manually find DOM elements and update them — fine for simple pages, a nightmare for complex apps.\n\nREACT (Meta/Facebook)\nMost popular frontend framework by every metric. Introduced JSX: HTML-like syntax inside JavaScript files.\n• Intentionally minimal — handles only the UI layer (components, state, rendering)\n• For everything else (routing, global state, forms): you choose additional libraries\n• Best for: Large apps, teams needing the largest ecosystem\n\nVUE (Evan You, ex-Google engineer)\n• Uses HTML templates (not JSX) — feels more familiar to beginners\n• Built-in solutions: Pinia for state, Vue Router for routing\n• Best for: Small to medium projects, gentle learning curve\n\nANGULAR (Google)\n• Most opinionated — TypeScript is REQUIRED (not optional)\n• Includes routing, forms, HTTP out of the box\n• Best for: Large enterprise apps with big teams\n\nSVELTE (Rich Harris)\n• A compiler — transforms components into optimized plain JS at BUILD TIME\n• Zero framework runtime shipped to the browser\n• Best for: Performance-critical apps\n\nThese are EITHER/OR — you pick ONE per project.",
   keyTerm:"Component",keyTermDef:"A self-contained piece of UI that manages its own appearance and data. The fundamental building block of modern frontends. You compose components like LEGO blocks to build entire applications.",
   rec:"Pick ONE frontend framework per project — they are either/or. In 2026, React is the safe default because of its enormous ecosystem, job market, and community.",
   tables:[{title:"Frontend framework comparison",headers:["Framework","TypeScript","Routing/State included?","Best For"],rows:[["React","Optional (strongly recommended)","No — you choose additional libraries","Large apps, biggest ecosystem"],["Vue","Optional","Yes (Pinia + Vue Router built-in)","Small-medium projects, gentle learning curve"],["Angular","Required (not optional)","Yes (all-in-one)","Enterprise apps, large teams, strict conventions"],["Svelte","Optional","No (SvelteKit adds this)","Performance-critical apps, minimal syntax"]]}],
   quizzes:[
    {q:"React is 'intentionally minimal.' What does this mean — and what is the consequence?",opts:["React ships with everything including routing, state management, and form handling","React handles only the UI layer; for routing, global state, and forms you must choose additional libraries yourself","React is minimal in file size but comprehensive in features","React only works for simple apps"],a:1,exp:"'React is intentionally minimal. It handles only the UI layer: components, state, and rendering. For everything else (routing, fetching data, managing global state, form handling), you choose additional libraries.' This is both its greatest strength and biggest source of confusion."},
    {q:"What makes Svelte fundamentally different from React, Vue, and Angular?",opts:["Svelte uses a different programming language","Svelte is a compiler — transforms components to optimized plain JS at build time with zero runtime overhead in the browser","Svelte requires TypeScript; the others don't","Svelte only works for mobile apps"],a:1,exp:"'Svelte is a compiler: it transforms your components into highly optimized, plain JavaScript at build time. The browser receives lean, fast code with zero framework overhead.' React, Vue, and Angular all ship framework runtime code to the browser; Svelte does not."},
    {q:"Angular requires TypeScript — not optional. Why does this matter?",opts:["It doesn't matter — TypeScript is always optional regardless","Angular enforces consistency across large teams by requiring TypeScript; the others give flexibility but less enforcement","TypeScript required means Angular is harder to learn","Optional TypeScript means React, Vue, and Svelte don't support TypeScript well"],a:1,exp:"Angular 'requires TypeScript (not optional)' as part of being 'the most opinionated and comprehensive framework' suited for 'Large enterprise apps with big teams needing strict conventions.'"},
    {q:"Vue has 'built-in solutions' for routing and state. What tools are included?",opts:["Redux for state, React Router for routing","Pinia for state, Vue Router for routing","Zustand for state, Next.js for routing","Jotai for state, SvelteKit for routing"],a:1,exp:"Vue 'provides built-in solutions: Pinia for state management and Vue Router for routing.' Unlike React, which makes you choose your own tools for these jobs."},
    {q:"Can you use React AND Vue in the same project?",opts:["Yes — combine them for the best features of each","No — frontend frameworks are either/or choices; you pick one per project","Yes — but only for specific components","Only if you use a meta-framework like Next.js"],a:1,exp:"'You pick ONE frontend framework per project. You do not combine React and Vue. They solve the same problem differently.' They are either/or choices."},
   ]},
  {id:5,title:"Styling your app",subtitle:"Tailwind CSS, CSS Modules, and the styling decision",
   granola:"Granola's clean, minimal interface — off-white backgrounds, subtle borders, compact notepad layout — reflects deliberate styling choices. Tailwind dominates new projects exactly like Granola's in 2026.",
   content:"Raw CSS for large apps has real problems: naming collisions (two developers creating a .button class with different styles), no reusable variables (same hex color repeated 47 times), difficulty organizing thousands of lines.\n\nTAILWIND CSS (Dominant in 2026, ~55% of new projects)\nUtility-first: apply tiny single-purpose classes directly in your HTML or JSX. Each class does exactly one thing.\n\nbg-blue-500 → sets a blue background\ntext-white → makes text white\np-4 → adds padding\nrounded → rounds corners\n\nWhy developers convert after a week:\n• Speed: Never leave your component file. No switching between HTML and CSS. No inventing class names.\n• Consistency: Built-in design system. Professional look without a designer.\n• Optimization: Tailwind strips every unused class. Production CSS often under 10 KB.\n• AI-friendly: Every class name explicitly states its intent — 'bg-blue-500' is unambiguous.\n\nOTHER APPROACHES:\n• CSS Modules: Scope regular CSS to individual components, solving naming collisions. Built into Next.js.\n• styled-components: Write CSS inside JavaScript. Declining in 2026.\n• Plain CSS / SCSS: Traditional approach.",
   keyTerm:"Utility-first CSS",keyTermDef:"Tailwind's approach: apply tiny, single-purpose classes directly in your HTML/JSX instead of writing CSS rules in separate files. Each class does one thing (bg-blue-500, p-4, text-white). Compose them to build any design.",
   rec:"Tailwind CSS is the 2026 default. AI coding tools generate Tailwind natively and accurately. Use it unless you have a specific reason not to.",
   tables:[{title:"Styling approaches comparison",headers:["Approach","Where CSS Lives","AI Friendliness","2026 Popularity"],rows:[["Tailwind CSS","In your HTML/JSX as utility classes","Excellent","Dominant (~55% of new projects)"],["CSS Modules","In .module.css files, one per component","Good","Medium (~20%)"],["styled-components","Inside JavaScript files","Moderate","Declining (~10%)"],["Plain CSS / SCSS","In .css or .scss files","Good","Medium (~15%)"]]}],
   quizzes:[
    {q:"What specific problem does Tailwind's utility-first approach solve compared to CSS in separate files?",opts:["Tailwind loads faster than CSS files","You never need to leave your component file, invent class names, or switch between HTML and CSS — everything is co-located","Tailwind automatically generates animations","Tailwind replaces the need for a designer"],a:1,exp:"'Speed: You never leave your component file. No switching between HTML and CSS files. No inventing class names.' This co-location of structure and style is Tailwind's primary productivity advantage."},
    {q:"Why is Tailwind described as especially 'AI-friendly'?",opts:["AI tools were built by the Tailwind team","Every class name explicitly states its intent — 'bg-blue-500' is unambiguous, so AI generates accurate code","Tailwind has a built-in AI that suggests class names","AI tools can read Tailwind documentation in real time"],a:1,exp:"'AI coding tools love Tailwind because every class name explicitly states its intent. \"bg-blue-500\" is unambiguous. AI generates Tailwind code with high accuracy.' Directly relevant to vibecoding."},
    {q:"What is the naming collision problem that CSS Modules solves?",opts:["CSS Modules prevent two stylesheets loading at the same time","Two developers accidentally creating a .button class with different styles — CSS Modules scope styles to individual components","CSS Modules prevent CSS from blocking page rendering","CSS Modules solve the problem of CSS files getting too large"],a:1,exp:"CSS Modules solve 'naming collisions (two developers accidentally creating a .button class with different styles)' by scoping 'regular CSS to individual components.'"},
    {q:"Tailwind strips unused classes in production. Why does this matter?",opts:["It speeds up the development server","Production CSS is often under 10 KB — only the classes you actually used are included","It prevents hackers from seeing your CSS","It makes Tailwind compatible with all browsers"],a:1,exp:"'Optimization: Tailwind scans your code and strips out every class you did not use. Your production CSS file contains only what you actually need, often under 10 KB.'"},
    {q:"Which styling approach is built directly into Next.js?",opts:["Tailwind CSS","styled-components","CSS Modules","SCSS"],a:2,exp:"'CSS Modules scope regular CSS to individual components, solving naming collisions while letting you write standard CSS syntax. They come built into Next.js.' No extra configuration needed."},
   ]},
  {id:6,title:"Meta-frameworks",subtitle:"Next.js, Nuxt, SvelteKit: the full-stack layer explained",
   granola:"Granola's web app almost certainly uses Next.js — the default full-stack wrapper for React apps built by Vercel. Next.js handles routing, SSR, and API endpoints all in one project.",
   content:"CRITICAL: A meta-framework is NOT a replacement for a frontend framework. It is built ON TOP OF one. Next.js uses React inside it. You are still writing React code. The meta-framework adds server-side capabilities around it.\n\nWHY META-FRAMEWORKS EXIST\nPlain React + Vite gives you an SPA (Single Page Application). Real problems:\n• Slow initial load: Users see a blank white page while JavaScript downloads\n• Poor SEO: Search engines see an empty page initially\n• No server capabilities: Need a separate backend project for database, payments, email\n• Manual routing: Must install and configure a routing library\n\nNEXT.JS (React meta-framework, created by Vercel)\nMost popular meta-framework in 2026. Adds:\n• Server-Side Rendering (SSR): server pre-builds HTML before sending to browser\n• File-based routing: create app/pricing/page.tsx → you have a /pricing page automatically\n• API routes: backend endpoints inside the same project\n• Server Components: some components run ONLY on the server\n\nThe Car Analogy: React alone is a car engine. Next.js is the fully assembled car. The engine is still React.",
   keyTerm:"Server-Side Rendering (SSR)",keyTermDef:"The server generates complete HTML before sending it to the browser. Pages load instantly with real content — good for SEO and performance. Next.js makes SSR the default. Contrast with SPA: loads blank, fills in afterward.",
   rec:"Use Next.js. It's the 2026 default meta-framework for React. The car analogy says it all — it's the fully assembled car, not just the engine.",
   tables:[{title:"Meta-framework map",headers:["Frontend Framework","Meta-Framework","Alternative (no meta-framework)"],rows:[["React","Next.js (dominant) or Remix","Plain React + Vite"],["Vue","Nuxt","Plain Vue + Vite"],["Svelte","SvelteKit","Plain Svelte + Vite"],["Any / Multiple","Astro","Any of the above"]]}],
   quizzes:[
    {q:"A meta-framework like Next.js is built ON TOP of React. Does this mean you stop writing React code?",opts:["Yes — Next.js replaces React with its own component system","No — you still write React code. Next.js adds server capabilities, routing, and deployment tools around React","Only for server-side components — client components still use React","Yes — Next.js has its own language"],a:1,exp:"'A meta-framework is NOT a replacement for a frontend framework. It is built ON TOP OF one. Next.js uses React inside it. You are still writing React code.'"},
    {q:"What are the two main problems with plain React (SPA) that meta-frameworks solve?",opts:["SPA is too expensive to host and hard to style","Slow initial load (blank page while JS downloads) and poor SEO (search engines see empty page)","SPA requires TypeScript and doesn't support CSS Modules","SPA can't use components and doesn't support animations"],a:1,exp:"'Slow initial load: Users see a blank white page while the browser downloads and executes all the JavaScript' and 'Poor SEO: Search engines see an empty page initially.' SSR from Next.js solves both by pre-building HTML on the server."},
    {q:"What does 'file-based routing' mean in Next.js?",opts:["Your CSS files determine the visual route through your app","Creating app/pricing/page.tsx automatically creates the /pricing route — no separate router configuration needed","Route files are uploaded to a CDN","Files are sorted alphabetically to determine navigation order"],a:1,exp:"'File-based routing: create a file at app/pricing/page.tsx and you automatically have a /pricing page.' Without this, you'd need to install and configure a routing library manually."},
    {q:"Next.js includes API routes. What does this mean for whether you need a separate Express server?",opts:["You always still need a separate Express server","For small to medium projects, Next.js API routes can handle backend logic — eliminating the need for a separate server","API routes are only for authentication","API routes replace Express but require a different language"],a:1,exp:"'API routes: build backend endpoints inside the same project, potentially eliminating the need for a separate Express server.' You only need a standalone backend when server logic is complex, multiple frontends share it, or you need WebSockets."},
    {q:"Astro is unique compared to Next.js, Nuxt, and SvelteKit. What makes it different?",opts:["Astro is the fastest Next.js alternative for React apps","Astro is framework-agnostic (use React, Vue, Svelte, or plain HTML in same project) and ships zero JavaScript to the browser by default","Astro is the official Google meta-framework","Astro replaces the need for a database"],a:1,exp:"'Astro is unique: framework-agnostic (you can use React, Vue, Svelte, or plain HTML in the same project) and ships zero JavaScript to the browser by default, making it excellent for content-heavy sites like blogs and documentation.'"},
   ]},
  {id:7,title:"The backend",subtitle:"Express, Fastify, NestJS, Hono, and API routes",
   granola:"When you use 'Chat with meeting' in Granola, a request hits Granola's backend. It validates your auth token, queries the database, calls an AI model (Claude, GPT, or Gemini), and returns the result. Express or similar handles this pipeline.",
   content:"The backend handles everything users should never see: processing payments, authenticating users, enforcing business rules, sending emails, connecting to databases.\n\nEXPRESS\nThe oldest and most widely used Node.js backend framework.\n• Minimal and unopinionated — doesn't dictate structure or database choice\n• Middleware system: functions that execute in sequence for every request\n  Example: logging → CORS check → auth check → route handler\n\nFASTIFY\n• Up to 2x faster than Express\n• Built-in JSON schema validation — automatically rejects mismatched requests\n• Excellent TypeScript support out of the box\n\nNESTJS\nThe 'Angular of backends' — heavily opinionated, TypeScript-first.\n• Enforces controllers (handle requests), services (business logic), modules (organize code)\n• Runs Express or Fastify under the hood\n• Best for: enterprise backends needing consistent patterns\n\nHONO\nUltralight (~14 KB). Designed for edge runtimes (Cloudflare Workers, Deno Deploy, Bun).\n\nKEY INSIGHT: If you use Next.js, its built-in API Routes can replace a separate Express server for small-to-medium projects.",
   keyTerm:"Middleware",keyTermDef:"A function that executes between receiving a request and sending a response — like a pipeline. Example: logging → CORS check → auth check → route handler. Express's middleware system is its most powerful feature.",
   rec:"Use Express for most projects — largest ecosystem, most tutorials. For Next.js projects, use built-in API routes and skip a separate backend entirely for small-medium apps.",
   tables:[{title:"Backend framework comparison",headers:["Framework","Speed","TypeScript","Learning Curve","Best For"],rows:[["Express","Good","Optional","Easy","Most projects, learning, prototypes"],["Fastify","Excellent (2x Express)","Excellent","Easy-Medium","Performance-sensitive APIs"],["NestJS","Good","Required","Steep","Enterprise backends, large teams"],["Hono","Fastest (~14 KB)","Excellent","Easy","Edge computing, serverless"],["Next.js Routes","Good","Excellent","Easy","Full-stack Next.js projects"]]}],
   quizzes:[
    {q:"What is middleware in Express, and why is the pipeline pattern powerful?",opts:["Middleware is a database between the frontend and backend","Middleware is a function that runs between receiving a request and sending a response — multiple middleware run in sequence, each doing one job","Middleware is a UI component that sits between pages","Middleware is a caching layer that speeds up responses"],a:1,exp:"'Express's middleware system is its most powerful feature. Middleware functions execute in sequence for every request.' Example: logging → CORS → auth check → route handler. Each does one job and passes to the next."},
    {q:"NestJS is described as 'the Angular of backends.' What does this comparison mean?",opts:["NestJS was built by Google, just like Angular","NestJS is heavily opinionated with required TypeScript and strict structure — just like Angular on the frontend","NestJS uses Angular components in the backend","NestJS and Angular share the same codebase"],a:1,exp:"'NestJS is the \"Angular of backends\": heavily opinionated, TypeScript-first, with a modular architecture.' Just as Angular is the most structured and opinionated frontend framework, NestJS is the most structured backend framework."},
    {q:"Fastify has built-in JSON schema validation. What does this mean practically?",opts:["Fastify validates your JavaScript syntax before running","Fastify automatically rejects API requests that don't match the expected data shape, without adding extra libraries","Fastify validates JSON files in your project folder","Fastify checks your Zod schemas at compile time"],a:1,exp:"'Fastify has built-in JSON schema validation: you define what data your API expects, and Fastify automatically rejects any request that does not match, returning clear error messages.' Validation without adding Zod separately."},
    {q:"When does the handbook say you do NOT need a separate backend?",opts:["You always need a separate backend for security","For small-to-medium Next.js projects, API routes can handle it. Separate backend needed for complex logic, multiple frontends, or WebSockets","You never need a separate backend if you use PostgreSQL","Only for apps with fewer than 1,000 users"],a:1,exp:"'If you use Next.js, its built-in API Routes and Server Actions can handle backend logic. For small to medium projects, this eliminates the need for a separate Express server. You only need a standalone backend when server logic is complex, multiple frontends share it, or you need WebSockets.'"},
    {q:"Which backend framework is specifically designed for edge runtimes like Cloudflare Workers?",opts:["Express — the most compatible option","NestJS — runs everywhere","Hono — ultralight (~14 KB), designed for edge and serverless","Fastify — it has edge mode built in"],a:2,exp:"'Hono is ultralight and ultrafast, designed to run on edge runtimes (Cloudflare Workers, Deno Deploy, Bun). At under 14 KB, it has become the go-to choice for serverless functions and edge computing.'"},
   ]},
  {id:8,title:"Databases and ORMs",subtitle:"PostgreSQL, Supabase, Drizzle vs. Prisma",
   granola:"Granola stores meeting notes, transcripts, and team data in a PostgreSQL database. Audio is processed locally and immediately discarded (privacy-first). The resulting structured notes persist in Granola's secure cloud database.",
   content:"Every web app stores data persistently. The dominant type: relational databases — data in tables like spreadsheets, queried using SQL.\n\nPOSTGRESQL\nThe most recommended database in 2026: free, open-source, handles everything from a personal blog to a Fortune 500 app.\n\nSUPABASE\nA cloud platform giving you managed PostgreSQL with dashboard, authentication, file storage, and real-time features — the easiest way to get a production-ready database without managing servers.\n\nDRIZZLE vs PRISMA — The Core Either/Or\nAn ORM (Object-Relational Mapping) sits between your TypeScript code and the database. Instead of writing raw SQL, you write TypeScript and the ORM translates it.\n\nThese are the two dominant ORMs in 2026. They are either/or — you pick one per project.",
   keyTerm:"ORM (Object-Relational Mapping)",keyTermDef:"A layer between your TypeScript code and the database. Instead of writing raw SQL, you write TypeScript (e.g. db.meetings.findMany()) and the ORM translates it into SQL queries. Drizzle and Prisma are the two dominant choices in 2026.",
   rec:"Use PostgreSQL as your database. Supabase for managed PostgreSQL with zero server setup. Drizzle if you know SQL and need edge/serverless (~7 KB). Prisma if you're new to databases and want a higher-level API.",
   tables:[{title:"Drizzle vs Prisma — head-to-head",headers:["Aspect","Drizzle","Prisma"],rows:[["Philosophy",'"If you know SQL, you know Drizzle." Close to SQL syntax.',"Abstracts SQL away. Describe what you want; Prisma figures out the query."],["Schema definition","In TypeScript — no special language","In .prisma files using Prisma Schema Language"],["Type safety","Inferred from TypeScript — updates instantly","Generated after running the prisma generate command"],["Bundle size","~7 KB — ideal for serverless/edge","~300+ KB (v6), smaller in v7"],["SQL knowledge needed","Helpful — queries mirror SQL syntax","Not required — API is higher-level"],["Best for","SQL-comfortable devs, edge/serverless","Teams new to databases, rapid prototyping"]]}],
   quizzes:[
    {q:"What is the core job of an ORM like Drizzle or Prisma?",opts:["To host your database in the cloud","To sit between your TypeScript code and the database — you write TypeScript and the ORM translates it into SQL","To validate data before it enters the database","To visualize your database tables in a dashboard"],a:1,exp:"'An ORM (Object-Relational Mapping) sits between your code and the database. Instead of writing raw SQL, you write TypeScript, and the ORM translates it.' You write db.meetings.findMany() and Drizzle/Prisma generates the SQL."},
    {q:"Drizzle's schema is defined in TypeScript. Where is Prisma's schema defined?",opts:["Also in TypeScript","In .prisma files using Prisma Schema Language — a special file format","In YAML configuration files","In JSON Schema files"],a:1,exp:"Drizzle — 'Schema: Defined in TypeScript. No special language.' Prisma — 'Schema: Defined in .prisma files using Prisma Schema Language.' Prisma requires learning its custom schema syntax."},
    {q:"Drizzle's type safety 'updates instantly.' Prisma requires an extra step — what is it?",opts:["Prisma requires restarting the dev server","Prisma requires running prisma generate to regenerate types after schema changes","Prisma requires deploying to production before types update","Prisma requires manually writing TypeScript interfaces"],a:1,exp:"Drizzle: 'Type Safety: Inferred from TypeScript. Updates instantly.' Prisma: 'Type Safety: Generated after running prisma generate command.' If you change your Prisma schema and forget to run generate, your TypeScript types will be out of sync."},
    {q:"Drizzle is ~7 KB. Prisma is ~300+ KB. Why does bundle size matter for serverless/edge deployments?",opts:["Larger bundles cost more money on Vercel","Serverless functions have cold start times — larger bundles mean slower startup; 7 KB loads almost instantly","Bundle size only matters for frontend code","Prisma's size means it can do more things than Drizzle"],a:1,exp:"Drizzle is 'Ideal for serverless/edge' because of its tiny ~7 KB size. In serverless environments, every cold start loads the entire bundle — a 300 KB library adds significant startup latency compared to 7 KB."},
    {q:"You're new to databases and want to prototype quickly without writing SQL. Which ORM does the handbook recommend?",opts:["Drizzle — it's the newer option","Prisma — 'best for teams new to databases, rapid prototyping' with a higher-level API that doesn't require SQL knowledge","Either — they're equivalent for beginners","Neither — use raw SQL for learning"],a:1,exp:"Prisma: 'Best For: Teams new to databases, rapid prototyping.' Its philosophy: 'Abstracts SQL away. Describe what you want, Prisma figures out the query.' Contrast with Drizzle: 'Best For: SQL-comfortable devs, edge/serverless.'"},
   ]},
  {id:9,title:"State management",subtitle:"Zustand, Redux, Jotai, and the two types of state",
   granola:"In Granola, when your live transcript streams mid-meeting, that's client state — tracked without server round-trips (Zustand). When past meetings load from the server, that's server state — fetched, cached, and refreshed (TanStack Query).",
   content:"'State' is any data your application needs to remember: Is the user logged in? Which tab is active? What meetings has the server returned?\n\nIn 2026, the ecosystem clearly separates state into TWO types — needing different tools.\n\nCLIENT STATE\nData that exists only in the browser. UI toggles, form inputs, user preferences.\nExamples: Is the sidebar open? Which filter is selected? Dark mode on/off?\nPrimary tool: ZUSTAND ('state' in German)\n\nSERVER STATE\nData from your backend/database. Needs fetching, caching, refreshing.\nExamples: User's meetings, notification count, team members.\nPrimary tool: TANSTACK QUERY\n\nZUSTAND\nMost popular client state library in 2026. Only ~1 KB. Near-zero boilerplate. Replaced Redux as the default for most React projects.\n\nTANSTACK QUERY\nHandles server state: fetching, caching, background refetching, retry logic, loading states, error handling.\nWithout it: 30–50 lines of boilerplate per request. 20 requests = 600–1000 lines of repetitive code.\n\nKEY INSIGHT: Zustand + TanStack Query work TOGETHER, not as alternatives. They solve completely different problems. The most common 2026 combination: Zustand + TanStack Query + React Hook Form.",
   keyTerm:"Client state vs server state",keyTermDef:"Client state is UI-only data in the browser (use Zustand). Server state is data from your backend that needs fetching, caching, and refreshing (use TanStack Query). Different problems — don't use the same tool for both.",
   rec:"Zustand for client state, TanStack Query for server state. They work together — not as alternatives. Do not try to manage server data with Zustand.",
   tables:[{title:"The two types of state",headers:["Type","Definition","Examples","Primary Tool"],rows:[["Client State","Data that exists only in the browser — UI interactions, preferences","Is the sidebar open? Which filter is selected? Dark mode on/off?","Zustand"],["Server State","Data from your backend/database that needs fetching, caching, refreshing","User's meetings, notification count, team members","TanStack Query"]]}],
   quizzes:[
    {q:"'Dark mode on/off' — is this client state or server state?",opts:["Server state — it must be saved to the database so it persists","Client state — it exists only in the browser as a UI preference, managed by Zustand","Neither — CSS handles dark mode, not JavaScript","Both — it should be in Zustand AND synced to the server"],a:1,exp:"Dark mode on/off is Client State: 'Data that exists only in the browser: UI toggles, form inputs, user preferences.' It's a UI interaction that doesn't require fetching from a server."},
    {q:"'User's meetings loaded from the Granola API' — is this client or server state? Which tool?",opts:["Client state — managed by Zustand","Server state — managed by TanStack Query (fetching, caching, refreshing)","Either tool works equally well","Build tool — it bundles the data at compile time"],a:1,exp:"Meeting data from an API is Server State: 'Data from your backend/database that needs fetching, caching, refreshing.' Primary tool: TanStack Query."},
    {q:"Zustand and TanStack Query are often used together. Are they alternatives to each other?",opts:["Yes — you choose either Zustand OR TanStack Query per project","No — they solve completely different problems and are used together: Zustand for client state, TanStack Query for server state","Yes — TanStack Query replaces Zustand in modern projects","No — but you should choose only one to keep your codebase simple"],a:1,exp:"'They work TOGETHER, not as alternatives. Zustand handles client state. TanStack Query handles server state.' The most common 2026 combination is Zustand + TanStack Query + React Hook Form."},
    {q:"What specific problem does TanStack Query solve that Zustand doesn't?",opts:["TanStack Query handles UI toggles and form inputs more elegantly","TanStack Query automatically handles loading states, caching, background refetching, retry logic, and request deduplication for server data","TanStack Query provides better TypeScript integration","TanStack Query manages CSS animations triggered by data changes"],a:1,exp:"Without TanStack Query you need 30–50 lines of boilerplate per request. 'TanStack Query automates all of it.' Zustand manages client-side UI data — it can't do server data fetching."},
    {q:"You're showing a list of meetings (from the API) and tracking which is currently selected (UI only). How do you manage these?",opts:["Use Zustand for both — simpler to have one tool","Use TanStack Query for both","TanStack Query for the meeting list (server state) and Zustand for which is selected (client state)","Use Redux for the list and Context API for the selection"],a:2,exp:"Classic split: the meeting list from the API is Server State → TanStack Query. Which meeting is selected is a UI preference (Client State) → Zustand. 'Zustand handles client state. TanStack Query handles server state.'"},
   ]},
  {id:10,title:"Data fetching",subtitle:"TanStack Query, SWR, and why they matter",
   granola:"When you open Granola and past meetings load instantly — TanStack Query serves cached data immediately, then silently refetches in the background. When you switch tabs and return, stale data refreshes automatically.",
   content:"Without a data fetching library, every network request requires manually handling:\n• Loading state (show a spinner while fetching)\n• Error state (show error, allow retry)\n• Caching so you don't re-fetch data you already have\n• Stale data handling to silently refresh outdated data\n• Retry logic to automatically retry failed requests\n• Deduplication: 3 components needing the same data → only 1 network call\n• Memory leak prevention when a component unmounts before a request completes\n\nThat is 30–50 lines of boilerplate per request. In a medium app with 20 requests: 600–1,000 lines of repetitive, error-prone code.\n\nTANSTACK QUERY (formerly React Query)\nDominant data fetching library in 2026. Automates all of the above.\n• First visit: fetches, shows loading, caches result\n• Subsequent visits: instantly shows cached data while silently refetching fresh data\n• On failure: retries 3 times with exponential backoff automatically\n• Tab switch + return: automatically refetches stale data\n• Multiple components want same data: only ONE network call made\n\nSWR (Stale-While-Revalidate) by Vercel\nSimpler than TanStack Query with fewer configuration options — quicker to learn, less flexible for complex scenarios.\n\nKEY DISTINCTION: TanStack Query manages SERVER state. Zustand manages CLIENT state. Used together, not as alternatives.",
   keyTerm:"Stale-While-Revalidate",keyTermDef:"A caching strategy: show the user old (stale) cached data immediately so they see something right away, then fetch fresh data in the background and update the display seamlessly. Both TanStack Query and SWR use this pattern.",
   rec:"Use TanStack Query for server state — the 2026 default. SWR is a simpler alternative. Never manage server data with Zustand.",
   tables:[],
   quizzes:[
    {q:"What does 'Stale-While-Revalidate' mean as a caching strategy?",opts:["Delete stale data while fetching fresh data, then show a spinner","Show old (stale) cached data immediately so the user sees something, then fetch fresh data in the background and update seamlessly","Wait for fresh data before showing anything","Reload the entire page to ensure fresh data on every visit"],a:1,exp:"'SWR (Stale-While-Revalidate): show stale (old cached) data immediately to the user, then revalidate (fetch fresh data) in the background and seamlessly update the display when fresh data arrives.' TanStack Query uses this same strategy."},
    {q:"If three React components all need the same user data, how does TanStack Query handle the network requests?",opts:["It makes three separate requests — one per component","It makes only one network request and shares the result across all three components (deduplication)","It makes two requests — one for the first, one shared for the other two","It waits until all three components are rendered before making any request"],a:1,exp:"'If multiple components request the same data, it makes only one network call and shares the result.' This deduplication prevents a complex page from hammering your API with redundant requests."},
    {q:"What happens when a component unmounts before a fetch completes — and how does TanStack Query help?",opts:["The fetch is automatically cancelled by the browser","You get a memory leak warning — the component tries to update state that no longer exists. TanStack Query handles this automatically","The data is cached and used when the component mounts again","Nothing happens — JavaScript handles this automatically"],a:1,exp:"The handbook lists 'Handle the case where the component unmounts before the request completes (otherwise you get a memory leak warning).' as one of the manual boilerplate requirements. TanStack Query handles this automatically."},
    {q:"TanStack Query was 'formerly known as React Query' — why was it renamed?",opts:["Meta claimed the React trademark","It was renamed because it added support for Vue, Svelte, and other frameworks beyond React","Vercel acquired it and rebranded it","The name 'React Query' was too confusing"],a:1,exp:"'TanStack Query (formerly React Query, renamed when it added support for Vue, Svelte, and other frameworks)' — the rename reflects that it is no longer React-only."},
    {q:"When should you choose SWR over TanStack Query?",opts:["When you need more configuration options and complex scenarios","When simplicity matters more — SWR is quicker to learn with fewer options, at the cost of less flexibility","When you use Vue instead of React","When you need automatic retry logic"],a:1,exp:"'SWR is simpler with fewer configuration options, which makes it quicker to learn but less flexible for complex scenarios.' Choose SWR when you want a simpler API; choose TanStack Query when you need more control."},
   ]},
  {id:11,title:"Validation with Zod",subtitle:"Ensuring data is the right shape",
   granola:"Every API request Granola receives — creating a Folder, updating a template, adding a team member — is validated against a schema. Zod ensures malformed or malicious data is rejected cleanly before it ever touches the database.",
   content:"Data validation: checking that data matches an expected shape before you use it. Critical at every boundary:\n• When a user submits a form\n• When your API receives a request\n• When you read environment variables at startup\n• When you process data from external services\n\nWithout validation, you trust data is correct. A user might submit an empty email. A malicious actor might send a negative price. Without validation, these silently corrupt your data or crash your app.\n\nZOD — Most popular validation library for TypeScript in 2026.\n\nYou define a schema (description of what your data should look like), then validate incoming data against it:\n• If data matches → Zod returns it with full TypeScript type safety\n• If it doesn't match → Zod returns detailed error messages explaining exactly what went wrong\n\nThe killer feature: TypeScript integration. One Zod schema gives you BOTH:\n• Runtime validation (catches bad data when code runs)\n• Compile-time type safety (TypeScript automatically knows the shape of validated data)\nNo duplication. No schemas getting out of sync with your types.\n\nWhere Zod is used:\n• Frontend: validating form inputs (with React Hook Form)\n• Backend: validating API request bodies\n• Startup: validating environment variables (catches misconfigurations before your app starts)\n• Contract: defining the shape shared between frontend and backend",
   keyTerm:"Schema validation",keyTermDef:"Checking that data matches an expected structure before processing it. Zod lets you define the shape once and use it for both runtime validation AND TypeScript type inference — no duplication, no types getting out of sync.",
   rec:"Use Zod — the 2026 default for TypeScript projects. One schema gives you both runtime validation and compile-time types. Avoid Yup and Joi for new projects.",
   tables:[{title:"Validation library comparison",headers:["Library","TypeScript Integration","Best For"],rows:[["Zod","Excellent — infers types directly from schemas","TypeScript projects (default choice 2026)"],["Yup","Good — but types are defined separately from the schema (can get out of sync)","Legacy projects, Formik users"],["Joi","Weak","Non-TypeScript Node.js backends"]]}],
   quizzes:[
    {q:"What is Zod's 'killer feature' — and why does it matter for TypeScript projects?",opts:["Zod is the fastest validation library at runtime","One Zod schema gives you both runtime validation AND compile-time TypeScript types — no duplication, no types getting out of sync","Zod has the most readable error messages of any library","Zod automatically generates database schemas from your TypeScript types"],a:1,exp:"'The killer feature of Zod is TypeScript integration… you get runtime validation AND compile-time type safety from a single definition. No duplication.' With Yup, you define the schema AND the TypeScript type separately — they can drift apart."},
    {q:"Zod can validate environment variables at startup. Why is this valuable?",opts:["It speeds up the startup process by caching valid values","It catches misconfigurations (like a missing API key) before the app starts, rather than discovering them at runtime when a feature fails","It automatically generates .env files","It encrypts sensitive environment variables"],a:1,exp:"'Validating environment variables at startup (catching misconfigurations before your app even starts).' Without this, a missing DATABASE_URL might only surface when a user tries to save something — a confusing runtime error. Zod catches it on startup."},
    {q:"What is the weakness of Yup's TypeScript integration compared to Zod?",opts:["Yup has no TypeScript support at all","Yup types are defined separately from the schema — they can get out of sync as your code evolves","Yup is slower at runtime than Zod","Yup doesn't work with React Hook Form"],a:1,exp:"Yup: 'types are defined separately from the schema (can get out of sync).' You define the Yup schema for runtime validation AND separately write a TypeScript interface — update one and forget the other, they diverge. Zod eliminates this."},
    {q:"A malicious user sends a request with a negative price. Where does Zod catch this — frontend, backend, or both?",opts:["Only on the frontend — that's where form validation happens","Only on the backend — frontend validation can be bypassed","Both — but backend validation is the critical one, since frontend data can always be manipulated","Neither — Zod only validates TypeScript types, not business logic"],a:2,exp:"'Never trust client-side data: Anything coming from the browser can be faked.' Zod on the backend is essential. Frontend Zod validation improves UX but any user can bypass it using dev tools. The backend Zod schema is the real security layer."},
    {q:"The handbook lists four places where Zod schemas are used. Which is NOT one of them?",opts:["Validating form inputs on the frontend with React Hook Form","Validating API request bodies on the backend","Validating environment variables at startup","Validating database query results before writing to the ORM"],a:3,exp:"The four uses are: frontend form inputs (React Hook Form), backend API request bodies, environment variables at startup, and defining the contract between frontend and backend. 'Validating database query results before writing to the ORM' is not listed."},
   ]},
  {id:12,title:"Build tools",subtitle:"Vite, Turbopack, and what bundlers actually do",
   granola:"When Granola engineers save a file and see changes in milliseconds — that's Vite's Hot Module Replacement. When they run 'npm run build' before deploying, the bundler packages TypeScript, JSX, and Tailwind classes into plain HTML, CSS, and JS the browser can read.",
   content:"Your development code uses TypeScript (browsers don't understand it), JSX (browsers don't understand it), Tailwind classes (need CSS compilation), and npm imports (browsers can't read node_modules). None of this runs directly in a browser.\n\nA build tool translates your development code into browser-ready code:\n• Compiles TypeScript → JavaScript (strips types)\n• Converts JSX → regular JavaScript function calls\n• Processes Tailwind classes → a CSS file\n• Bundles hundreds of files → a few optimized files\n• Minifies (removes whitespace, shortens variable names)\n• Code-splits (browser only downloads what it needs for the current page)\n\nVITE (pronounced 'veet' — French for 'fast')\nDominant build tool in 2026. Created by Evan You (creator of Vue).\n• Development: serves files using native ES modules → changes appear in milliseconds (HMR)\n• Production: bundles everything using Rollup under the hood\n• The default for React/Vue/Svelte projects without a meta-framework\n\nTURBOPACK: Built into Next.js by Vercel. Handles builds automatically — you don't configure it.\nWEBPACK: Dominant bundler 2015–2022. More configurable but slower. Still in many legacy codebases.\nROLLUP: Specialized for building libraries (not applications). Used by Vite for production builds.\nESBUILD: Ultra-fast, written in Go. Used under the hood by Vite.",
   keyTerm:"Hot Module Replacement (HMR)",keyTermDef:"When you change a file during development, only that changed module swaps in the browser instantly — no full page reload. Vite makes this nearly instantaneous. Dramatically speeds up the development feedback loop.",
   rec:"You rarely configure build tools directly — your framework chooses. Plain React/Vue/Svelte → Vite. Next.js → Turbopack (automatic). Don't start new projects with Webpack.",
   tables:[{title:"Build tool selection by scenario",headers:["Scenario","Build Tool","Do You Configure It?"],rows:[["Plain React/Vue/Svelte project","Vite","Yes (it's the default, minimal config needed)"],["Next.js project","Turbopack","No (Next.js decides for you)"],["Library published to npm","Rollup or tsup","Yes"],["Older/legacy project","Webpack","Inherited — don't switch unless needed"]]}],
   quizzes:[
    {q:"Why do you need a build tool at all? Why can't you send TypeScript and JSX files directly to the browser?",opts:["You could — but build tools make files load faster","Browsers only understand HTML, CSS, and plain JavaScript. TypeScript, JSX, and npm imports are development abstractions that must be translated first","Build tools are only needed for production — development works without them","Build tools are required by npm to install packages"],a:1,exp:"'You use TypeScript (browsers do not understand it), JSX (browsers do not understand it), Tailwind utility classes (need to be compiled into CSS), and import statements referencing npm packages (browsers cannot read from node_modules). None of this code can run in a browser directly.'"},
    {q:"What is the difference between how Vite works in DEVELOPMENT versus PRODUCTION?",opts:["Vite works the same way in both — it always uses Rollup","Development: serves individual files using native ES modules for instant HMR. Production: bundles everything into optimized files using Rollup","Development: uses Turbopack for speed. Production: switches to Webpack for compatibility","Development: no build step. Production: runs TypeScript directly"],a:1,exp:"'During development, Vite serves files individually using native ES modules, so changes appear in the browser in milliseconds (HMR). For production, it bundles everything into optimized files using Rollup under the hood.'"},
    {q:"If you're using Next.js, which build tool do you use — and do you need to configure it?",opts:["Vite — you configure it in vite.config.ts","Turbopack — built into Next.js, configured automatically; you don't need to set it up","Webpack — Next.js still uses Webpack under the hood","esbuild — Next.js uses esbuild directly"],a:1,exp:"'Turbopack is the build tool built into Next.js, created by Vercel. If you use Next.js, Turbopack handles your builds automatically.' From the selection table: Next.js project → Turbopack → 'No (Next.js decides for you).'"},
