    {q:"Rollup is listed as a build tool. What is its specific use case?",opts:["When building web applications that users interact with","When building libraries that other developers publish to npm","When deploying to Cloudflare Workers","When you need the fastest possible HMR in development"],a:1,exp:"'Rollup is specialized for building libraries rather than applications.' From the selection table: 'Library published to npm → Rollup or tsup.' Vite uses Rollup internally for its production builds of applications."},
    {q:"What does 'minification' do during the build process — and why does it matter?",opts:["Minification compresses images to reduce their file size","Minification removes whitespace and shortens variable names, reducing file sizes so pages load faster for users","Minification encrypts your source code so competitors can't copy it","Minification splits your code into smaller chunks for lazy loading"],a:1,exp:"'Minifying code (removing whitespace and shortening variable names) to reduce file size' — smaller files mean faster downloads for users, especially on slow connections."},
   ]},
  {id:13,title:"Git and GitHub",subtitle:"Version control, branches, and collaboration",
   granola:"Granola's entire codebase lives in a private GitHub repository. Every feature — like the MCP server or Spaces — goes through: branch → commit → pull request → review → merge. Nothing ships without this workflow.",
   content:"Git is version control: an undo system for your entire project. Every meaningful change saved as a 'commit' (a snapshot). You can go back to any snapshot, create parallel 'branches' to experiment safely, and merge changes from multiple developers without overwriting each other.\n\nGitHub is a cloud platform hosting Git repositories online, adding collaboration features (pull requests, code review, issues), and connecting to deployment platforms like Vercel and Netlify.\n\nGIT CONCEPTS TABLE (see below)\n\nCRITICAL FILES:\n• .gitignore: tells Git which files to NEVER track. Two files that must ALWAYS be here:\n  - node_modules/ — too large, always recreatable with npm install\n  - .env — contains secret API keys (committing this exposes secrets publicly)\n\nFOR VIBE CODERS: Even if AI writes all your code, you need Git.\n• Vercel and Netlify connect to GitHub: push code → auto-deploy\n• Lovable and Cursor both integrate directly with GitHub\n• Connect your project from day one.",
   keyTerm:"Pull request",keyTermDef:"A proposal to merge code from one branch into another. Others review and approve before merging. This is how professional teams ship code safely — no direct pushes to the main branch without review.",
   rec:"Use Git from day one — even for solo projects. Connect your vibecoding tool to a GitHub repo immediately. Always add .env and node_modules to .gitignore before your first commit.",
   tables:[{title:"Core Git concepts",headers:["Concept","What It Is","Analogy"],rows:[["Repository","Your project folder, tracked by Git","A filing cabinet for one project"],["Commit","A saved snapshot with a description","A save point in a video game"],["Branch","A parallel version for isolated work","A separate draft of a document"],["Pull Request","A proposal to merge changes — reviewed before merging","Submitting your draft for review"],["Push / Pull","Upload to / download from the cloud (GitHub)","Syncing with a shared drive"]]}],
   quizzes:[
    {q:"What is a Git 'branch' and why would you create one?",opts:["A backup copy of your entire computer's files","A parallel version of your codebase for isolated work — changes don't affect the main codebase until you merge","A different version of your app for different users","A GitHub feature for organizing repositories"],a:1,exp:"A branch is 'A parallel version for isolated work' — like 'A separate draft of a document.' You create a branch to work on a new feature without affecting the working main codebase. When ready, you merge it back."},
    {q:"Why must your .env file NEVER be committed to Git?",opts:["Git can't handle the file format","It contains secret API keys and database passwords — committing it exposes these secrets to anyone who can see the repository",".env files are too large for Git to handle efficiently","Git overwrites .env files on every push"],a:1,exp:"'.env — contains secret API keys (committing this exposes your secrets publicly).' The .gitignore file must list .env to prevent this. Accidentally committed secrets must be rotated immediately."},
    {q:"You deleted your node_modules folder by accident. How do you get it back?",opts:["Re-clone the entire repository from GitHub","Run 'npm install' — it reads package.json and downloads all dependencies fresh","Ask the person who first created the project to send you a copy","Restore it from your computer's trash"],a:1,exp:"'When someone shares a project with you, they do not include the node_modules folder. Instead, you run \"npm install\" and npm reads the package.json to download everything fresh.' The same applies if you delete it locally."},
    {q:"How do deployment platforms like Vercel and Netlify connect to your code?",opts:["You manually upload files to their servers via FTP","They connect to your GitHub repository — when you push code to main, they automatically build and deploy","You email them your code as a ZIP file","They pull from your local computer via a desktop app"],a:1,exp:"'Most deployment platforms (Vercel, Netlify) connect to GitHub: push code, and they auto-deploy.' This Git-connected workflow is why the handbook says even vibe coders need Git."},
    {q:"What is the difference between 'push' and 'pull' in Git?",opts:["Push downloads code; pull uploads code","Push uploads your local commits to GitHub; pull downloads the latest changes from GitHub to your local machine","Push creates a new branch; pull merges a branch","Push creates a commit; pull reviews it"],a:1,exp:"From the concepts table: 'Push / Pull: Upload to / download from the cloud' — like 'Syncing with a shared drive.' Push sends your local changes up to GitHub. Pull brings down changes others have made."},
   ]},
  {id:14,title:"Authentication and security",subtitle:"Auth providers, authorization, and security basics",
   granola:"Granola uses OAuth (log in with Google) and issues JWTs for subsequent requests. It achieved SOC 2 Type 2 compliance — a rigorous third-party security audit. The handbook's warning applies directly: AI-generated code commonly has security vulnerabilities.",
   content:"Authentication (authn): verifying who a user is — login.\nAuthorization (authz): determining what they can do — permissions.\nBoth are critical and where vibe-coded apps most commonly have security problems.\n\nAUTH PROVIDERS — never build auth from scratch (see table below)\n\nSIX SECURITY ESSENTIALS:\n\n1. NEVER trust client-side data\nAnything from the browser can be faked. Users can open dev tools and modify any data. Always validate on the server, even if you validated on the frontend.\n\n2. NEVER expose secrets in frontend code\nAPI keys, database passwords must NEVER appear in frontend code. Anyone can view your JavaScript in dev tools. Store secrets in .env files (server-only).\n\n3. NEVER store passwords in plain text\nAlways hash passwords using algorithms like bcrypt. Auth providers (Supabase Auth, Clerk) handle this automatically.\n\n4. ALWAYS use HTTPS\nEncrypts all data between browser and server. All modern deployment platforms provide HTTPS automatically.\n\n5. VALIDATE ALL inputs with Zod\nUse Zod on every piece of data entering your server. Prevents entire categories of attacks.\n\n6. USE AN ORM for database queries\nDrizzle and Prisma automatically prevent SQL injection attacks. Raw SQL requires manually sanitizing every input — easy to forget.\n\nWARNING: A 2025 study found 45% of AI-generated code contained security vulnerabilities. Functionality is NOT the same as security.",
   keyTerm:"SQL injection",keyTermDef:"An attack where malicious SQL code is inserted via a form field and executed against your database. ORMs like Drizzle and Prisma prevent this automatically. Raw SQL requires manual sanitization — easy to forget.",
   rec:"Never build auth from scratch. Use Supabase Auth (if using Supabase), Clerk (for great pre-built UI), or NextAuth (for full control). Always get security review on login, payment, and data handling flows before production.",
   tables:[{title:"Auth provider comparison",headers:["Provider","Type","Best For"],rows:[["Supabase Auth","Built into Supabase","Projects using Supabase for the database"],["Clerk","Third-party service","Beautiful pre-built UI, fast setup"],["NextAuth / Auth.js","Open-source library","Full control, self-hosted"],["Firebase Auth","Google service","Mobile apps, Google ecosystem"]]}],
   quizzes:[
    {q:"A user submits a form on Granola's frontend. You validated with Zod in the browser. Is this sufficient?",opts:["Yes — frontend validation with Zod is sufficient","Yes — if the user sees a validation error they can't bypass it","No — frontend validation can be bypassed by anyone using browser dev tools; backend validation is the critical security layer","Only if the form doesn't handle payments"],a:2,exp:"Rule 1: 'Never trust client-side data: Anything coming from the browser can be faked. A user can open their browser developer tools and modify any data before it is sent to your server. Always validate and verify all data on the server, even if you already validated it on the frontend.'"},
    {q:"Why must API keys never appear in frontend JavaScript code?",opts:["Frontend JavaScript runs slower, so secrets would slow it down","Anyone can view your frontend JavaScript using browser dev tools — secrets in frontend code are exposed to the entire internet","Frontend code is deleted after the user closes the browser","API keys only work on servers, so they'd be non-functional in the frontend"],a:1,exp:"Rule 2: 'API keys, database passwords, authentication secrets must NEVER appear in frontend code. Anyone can view your frontend JavaScript by opening developer tools.' Store secrets in .env files — server-side only."},
    {q:"Why does the handbook recommend using an ORM for security reasons?",opts:["ORMs validate your TypeScript types at runtime","ORMs automatically prevent SQL injection attacks — raw SQL requires manually sanitizing every input, which is easy to forget","ORMs encrypt database contents automatically","ORMs prevent unauthorized users from accessing the database directly"],a:1,exp:"Rule 6: 'Use an ORM for database queries: ORMs like Drizzle and Prisma automatically prevent SQL injection attacks. If you write raw SQL, you must manually sanitize every input, which is easy to forget.'"},
    {q:"What is the difference between authentication and authorization?",opts:["They are the same thing — different words for the same concept","Authentication verifies who you are (login); authorization determines what you're allowed to do (permissions)","Authentication is for users; authorization is for admin accounts","Authentication is frontend; authorization is backend"],a:1,exp:"'Authentication verifies who a user is (login). Authorization determines what they can do (permissions).' Example: authentication confirms you're a Granola user; authorization determines whether you can access a specific team's Spaces."},
    {q:"The handbook says 45% of AI-generated code has security vulnerabilities. What action does it recommend?",opts:["Use only official framework code, not AI-generated code","Have someone with security experience review login systems, payment flows, and sensitive data handling before they go live","Add extra Zod validation everywhere to compensate","Use NextAuth instead of Clerk for better security"],a:1,exp:"'When your AI builds a login system, payment flow, or anything handling sensitive data, have someone with security experience review it before putting it in front of real users. Functionality is not the same as security.'"},
   ]},
  {id:15,title:"Deployment",subtitle:"Vercel, Netlify, Railway, and getting your app online",
   granola:"Granola's web app deploys to Vercel — the company that created Next.js. Every merge to GitHub main auto-deploys via CI/CD. Every pull request gets a unique preview URL. Zero manual shipping steps.",
   content:"Deployment puts your app on the internet. During development it runs on localhost (your computer only). Deployment puts it on a server with a public URL anyone can visit.\n\nIn 2026, the standard workflow: connect your GitHub repository → push code → platform automatically builds and deploys. Every push to main = new deployment. Every pull request = a unique preview URL to test before going live.\n\nVERCEL\nCreated Next.js. Optimized for frontend and full-stack JavaScript.\nBest for: Next.js projects, React SPAs, static sites, frontend-heavy projects.\nFree tier generous enough for personal projects and small businesses.\n\nNETLIFY\nFramework-agnostic (not tied to Next.js). Pioneered: automatic HTTPS, branch previews, form handling, serverless functions.\nBest for: Static sites, Astro/Nuxt/SvelteKit projects, sites with forms.\n\nRAILWAY\nFills a different niche: deploying backends, databases, full-stack apps. Full servers — run Express, PostgreSQL, Redis, background workers. Supports Docker.\nBest for: Standalone backends, database hosting, full-stack apps, background services.\n\nAWS / GOOGLE CLOUD / AZURE\nVastly more powerful AND vastly more complex. Setting up a basic web app on AWS requires configuring 5–10 different services.\nBest for: Enterprise apps, complex infrastructure, teams with DevOps expertise.",
   keyTerm:"CI/CD",keyTermDef:"Continuous Integration / Continuous Deployment. Every code push automatically builds, tests, and deploys your app — no manual steps. Vercel and Netlify set this up automatically when you connect your GitHub repository.",
   rec:"Use Vercel for Next.js and frontend projects. Use Railway for standalone backends or when you need persistent servers and databases. Avoid AWS until you've outgrown simpler platforms.",
   tables:[{title:"Deployment platform comparison",headers:["Platform","Type","Difficulty","Free Tier","Best For"],rows:[["Vercel","Frontend + Serverless","Easy","Generous","Next.js, React, static sites"],["Netlify","Frontend + Serverless","Easy","Generous","Any framework, documentation sites, forms"],["Railway","Full-stack + Databases","Easy-Medium","Trial credits","Backends, databases, Docker apps"],["Render","Full-stack","Medium","Limited","Alternative to Railway"],["AWS / GCP / Azure","Everything","Hard","12-month trial","Enterprise, complex infrastructure"]]}],
   quizzes:[
    {q:"Railway fills a different niche than Vercel and Netlify. What can Railway do that they can't?",opts:["Railway deploys Next.js apps faster than Vercel","Railway gives you full servers where you can run Express, PostgreSQL, Redis, Docker — not just frontend/serverless apps","Railway has a better free tier than both","Railway automatically generates preview URLs for pull requests"],a:1,exp:"'Railway fills a different niche: deploying backends, databases, and full-stack applications. Unlike Vercel and Netlify which focus on frontend deployments, Railway gives you full servers where you can run Express, PostgreSQL, Redis, background job workers.'"},
    {q:"You're building a Next.js app. Which platform does the handbook recommend?",opts:["Railway — it's the most powerful option","AWS — it scales the best","Vercel — created Next.js and is optimized specifically for it","Netlify — it's framework-agnostic and works with everything"],a:2,exp:"Vercel is 'Best For: Next.js, React, static sites.' The handbook notes 'Vercel is the company that created Next.js, and their platform is optimized for deploying frontend and full-stack JavaScript applications.'"},
    {q:"Every pull request on Vercel and Netlify automatically gets something. What is it and why is it useful?",opts:["A cost estimate for running the deployment in production","An automated security scan report","A unique preview URL to test changes before they go live","An automatically generated changelog"],a:2,exp:"'Every pull request gets a unique preview URL so you can test changes before they go live.' This means you can share a real running version of your feature with stakeholders without affecting the production app."},
    {q:"What is the key tradeoff with AWS/Google Cloud/Azure compared to Vercel or Railway?",opts:["Cloud providers are slower but cheaper","Cloud providers are vastly more powerful and flexible — but vastly more complex, requiring configuring 5–10 services for a basic app","Cloud providers have better free tiers and easier setup","Cloud providers only work with specific frameworks"],a:1,exp:"'The major cloud providers offer everything… but also vastly more complex. Setting up a basic web application on AWS from scratch involves configuring 5-10 different services.' Use Vercel or Railway first; move to cloud providers only when you outgrow them."},
    {q:"What does CI/CD mean, and which platforms set it up automatically when you connect GitHub?",opts:["Code Integration / Code Deployment — only Railway supports this","Continuous Integration / Continuous Deployment — every push automatically builds and deploys. Vercel and Netlify set this up automatically","Continuous Integration / Continuous Deployment — but you must configure it manually in YAML files","Central Infrastructure / Central Deployment — only available on AWS"],a:1,exp:"CI/CD: 'Every code push automatically builds and deploys your app.' 'Every push to the main branch triggers a new deployment. Every pull request gets a unique preview URL.' Vercel and Netlify handle this automatically when you connect your GitHub repo."},
   ]},
  {id:16,title:"The Master Map",subtitle:"Every job, every tool, every decision in one place",
   granola:"Granola's stack: TypeScript → Node.js → npm → React → Next.js → Tailwind → Next.js routes or Express → PostgreSQL → Drizzle/Prisma → Zustand → TanStack Query → Zod → Turbopack (via Next.js) → Vercel. This table maps Granola's entire tech universe.",
   content:"This is the definitive reference from Chapter 16. 14 categories. Every job in a web app needs exactly one tool. Tools that do the same job are EITHER/OR choices.\n\nTHE MASTER MAP TABLE (see below)\n\nThe core rule: tools that do the same job are either/or. Tools that do different jobs work together.\n\nEither/or example: Drizzle OR Prisma — both are ORMs (same job).\nWorks together example: Zod AND Zustand AND TanStack Query — all different jobs (validation, client state, server state).\n\n'When in doubt, use this stack exactly. Don't mix and match unless you have a specific reason — each tool in this map was chosen because it plays well with the others.'",
   keyTerm:"The 2026 default stack",keyTermDef:"TypeScript + Node.js + npm + React + Next.js + Tailwind CSS + Express or Next.js routes + PostgreSQL + Drizzle or Prisma + Zustand + TanStack Query + Zod + Vite + Vercel. What AI tools generate by default.",
   rec:"Memorize this table. When you see unfamiliar tool names in AI-generated code, look them up here. The 2026 defaults are good choices — use them unless you have a specific reason not to.",
   tables:[{title:"The Master Map — all 14 categories",headers:["Job","What It Does","Either/Or Options","2026 Default"],rows:[["Language","Programming language","JavaScript OR TypeScript","TypeScript"],["Runtime","Runs JS outside browser","Node.js, Deno, or Bun","Node.js"],["Package Manager","Manages dependencies","npm, pnpm, Yarn, Bun","npm"],["Frontend","Builds the UI","React, Vue, Angular, Svelte","React"],["Meta-Framework","Full-stack wrapper","Next.js, Nuxt, SvelteKit, Remix, Astro, or None","Next.js"],["Styling","Visual appearance","Tailwind, CSS Modules, styled-components, CSS","Tailwind CSS"],["Backend","Server logic + APIs","Express, Fastify, NestJS, Hono, Next.js Routes","Express or Next.js"],["Database","Data storage","PostgreSQL, MySQL, SQLite, MongoDB","PostgreSQL"],["ORM","DB access in TypeScript","Drizzle OR Prisma","Either"],["Client State","UI state management","Zustand, Redux, Jotai","Zustand"],["Server State","Data fetching + cache","TanStack Query OR SWR","TanStack Query"],["Validation","Data shape checking","Zod, Yup, Joi","Zod"],["Build Tool","Code transformation","Vite, Turbopack, Webpack","Vite"],["Deployment","Hosting","Vercel, Netlify, Railway, AWS","Vercel"]]}],
   quizzes:[
    {q:"MASTER MAP: You see 'Zustand' in AI-generated code. What job does it do?",opts:["Server State — data fetching and caching","Validation — checking data shape","Client State — UI state management","ORM — database access in TypeScript"],a:2,exp:"From the Master Map: 'Client State → UI state management → Zustand, Redux, Jotai → 2026 Default: Zustand.' Zustand manages client-side UI state — which panels are open, which tabs are active, etc."},
    {q:"MASTER MAP: You see 'Drizzle' in AI-generated code. Can you also use 'Prisma' in the same project?",opts:["Yes — they do different jobs and work together well","No — they are both ORMs (same job: DB access in TypeScript). You pick one per project","Yes — but only if you use different databases for each","No — they require different versions of Node.js"],a:1,exp:"From the Master Map: 'ORM → DB access in TypeScript → Drizzle OR Prisma → Either.' Drizzle and Prisma are either/or choices — they do the same job. Never use both."},
    {q:"MASTER MAP: Your AI generated a project with TanStack Query AND Zustand. Is this correct or redundant?",opts:["Redundant — choose one","Both are correct — they do different jobs: TanStack Query handles server state, Zustand handles client state","Only correct if using Next.js","Replace both with Redux — it handles both types of state"],a:1,exp:"From the Master Map: 'Client State → Zustand' and 'Server State → TanStack Query.' They do DIFFERENT jobs and work together. The handbook explicitly says: 'Together, they cover virtually every state management need.'"},
    {q:"MASTER MAP: What is the 2026 default for the ORM job — and why is this unusual?",opts:["Drizzle — it's newer and faster","Prisma — it has more documentation","'Either' — unlike most categories, both Drizzle and Prisma are equally valid 2026 defaults","There is no default — always choose based on SQL experience"],a:2,exp:"From the Master Map: 'ORM → 2026 Default: Either.' This is unique — most categories have a clear default (TypeScript, React, Tailwind). The ORM category is genuinely split: 'Drizzle OR Prisma' — neither has decisively won."},
    {q:"MASTER MAP: A teammate says 'let's use Vue AND React in our project.' Is this valid?",opts:["Yes — React for complex components, Vue for simpler ones","No — Frontend frameworks are either/or choices. You pick one per project: React OR Vue OR Angular OR Svelte","Yes — but only if you use a meta-framework like Next.js","Yes — this is called micro-frontend architecture"],a:1,exp:"From the Master Map: 'Frontend → Builds the UI → React, Vue, Angular, Svelte.' These are either/or choices — one per project. 'You do not combine React and Vue. They solve the same problem differently.'"},
   ]},
  {id:17,title:"Vibe coding and AI tools",subtitle:"The landscape, the tools, and the honest limits",
   granola:"Granola was built by a small team moving fast — exactly where vibecoding shines. You're already using Lovable. This chapter maps the full tool landscape with skill levels for each, plus an honest account of where vibe coding falls short.",
   content:"Vibe coding: building software by describing it in natural language to an AI. The AI generates real, custom, editable, deployable source code — not templates, not drag-and-drop.\n\nTHE FOUR-STEP WORKFLOW:\n1. Describe: 'Build a task management app where users can create projects, add tasks with due dates, and mark them complete. Use a clean modern design.'\n2. Generate: AI produces files, folders, database schemas, UI components, API routes, everything.\n3. Iterate: 'The sidebar is too wide. Add a dark mode toggle. Sort tasks by due date.'\n4. Deploy.\n\nThis is fundamentally different from:\n• Traditional coding: the developer writes every line\n• No-code tools: limited to pre-built templates and drag-and-drop — you hit walls quickly with custom logic\n\nVIBE CODING TOOLS TABLE (see below)\n\nWHY UNDERSTANDING THE ECOSYSTEM MATTERS:\nWhen your AI generates a Next.js project with Drizzle and Zustand, you should be able to say: 'Next.js handles both frontend (React inside) and backend (API routes). Drizzle talks to my database. Zustand manages shared UI state.' Without this, you can't debug problems, extend the project, or evaluate the AI's choices.\n\nTHE HONEST LIMITS:\nWorks brilliantly for: prototypes, personal projects, internal tools, MVPs.\nStill needs human expertise for: security review, performance optimization, architectural decisions, edge case handling.\nBest approach: vibe code the initial version, then have experienced developers review and harden for production.",
   keyTerm:"MVP (Minimum Viable Product)",keyTermDef:"The simplest version of a product that works and can be tested with real users. Vibe coding excels at building MVPs quickly. Hardening for large-scale production still requires human expertise.",
   rec:"Match the tool to your skill level. New to vibecoding → Bolt or Lovable (zero setup, immediate results). More technical → Cursor or Claude Code (more control). Most pros use multiple tools across the project lifecycle.",
   tables:[{title:"The major vibe coding tools in 2026",headers:["Tool","Type","Best For","Skill Level"],rows:[["Cursor","AI-enhanced code editor (IDE)","Developers who want AI inside their familiar editor","Intermediate to Advanced"],["Claude Code","Terminal-based AI agent","Complex, multi-file projects; large codebase understanding","Intermediate to Advanced"],["Bolt.new","Browser-based app builder","Complete beginners; quick prototypes; no local setup needed","Beginner"],["Lovable","Browser-based app builder","Beautiful UI-focused apps; non-developers","Beginner"],["Replit","Online IDE with AI","Learning, prototyping, instant deployment, collaboration","Beginner to Intermediate"],["GitHub Copilot","AI autocomplete in VS Code","Line-by-line coding suggestions for developers","Intermediate"],["Windsurf","AI-enhanced code editor","Alternative to Cursor with different AI approach","Intermediate to Advanced"]]}],
   quizzes:[
    {q:"TOOLS TABLE: You're a non-developer and want to build something with no local setup. Which tool does the handbook recommend?",opts:["Cursor — it's the most powerful","Claude Code — it handles complex projects","Bolt.new or Lovable — browser-based, no setup, designed for beginners","GitHub Copilot — it autocompletes everything"],a:2,exp:"Bolt.new: 'Browser-based app builder' for 'Complete beginners; quick prototypes; no local setup needed' at 'Beginner' skill level. Lovable: 'Browser-based app builder' for 'Beautiful UI-focused apps; non-developers.'"},
    {q:"TOOLS TABLE: What type of tool is Claude Code, and what is it best for?",opts:["A browser-based app builder best for non-developers","A terminal-based AI agent best for complex, multi-file projects and large codebase understanding","An AI autocomplete tool that works inside VS Code","An online IDE best for learning and collaboration"],a:1,exp:"Claude Code is a 'Terminal-based AI agent' best for 'Complex, multi-file projects; large codebase understanding' at 'Intermediate to Advanced' skill level."},
    {q:"What is fundamentally different about vibe-coded apps versus no-code drag-and-drop builders?",opts:["Vibe coding is slower but produces cleaner code","Vibe coding generates real, custom, editable, deployable source code — not templates; no-code tools hit walls quickly with custom logic","No-code tools are more powerful because they don't require prompting","There is no meaningful difference — both produce the same output"],a:1,exp:"'Vibe coding generates real, custom code that you own, can modify, and can deploy anywhere.' Contrast with no-code: 'limited by the platform's capabilities. You hit walls quickly when you need custom logic.'"},
    {q:"The handbook describes the 'honest limits' of vibe coding. Where does it fall short?",opts:["Brilliant for enterprise apps; falls short for prototypes","Brilliant for prototypes, personal projects, internal tools, and MVPs; needs human expertise for security review, performance, architecture, and edge cases","Brilliant for all apps equally — limits are only about developer skill","Brilliant for frontend apps only; falls short for any backend work"],a:1,exp:"'Vibe coding works brilliantly for prototypes, personal projects, internal tools, and MVPs. But production applications that handle sensitive data, process payments, or serve thousands of users still need human expertise for security review, performance optimization, architectural decisions, and edge case handling.'"},
    {q:"TOOLS TABLE: Cursor and Windsurf are both 'AI-enhanced code editors.' How are they different?",opts:["Cursor is for React; Windsurf is for Vue","Cursor requires TypeScript; Windsurf works with JavaScript","They target the same skill level — Windsurf is described as 'an alternative to Cursor with a different AI approach'","Cursor is browser-based; Windsurf requires local installation"],a:2,exp:"Cursor: 'AI-enhanced code editor (IDE)' for 'Developers who want AI inside their familiar editor' at 'Intermediate to Advanced.' Windsurf: 'AI-enhanced code editor' as 'Alternative to Cursor with different AI approach' at 'Intermediate to Advanced.' Same category, different AI implementation."},
   ]},
  {id:18,title:"How to read error messages",subtitle:"The most common errors and what they mean",
   granola:"When building on Granola's MCP or API and something breaks, the error is your first clue. 'ECONNREFUSED' means check your connection URL. Knowing these patterns is the highest-ROI skill in vibecoding.",
   content:"Error messages are the biggest source of frustration for vibe coders. The Golden Rule: read the FIRST line of the error carefully. Copy it into Google or your AI tool. 90% of errors have been encountered and solved by others before you.\n\nFRONTEND ERRORS (see table below)\n\nBACKEND AND BUILD ERRORS (see table below)\n\nThe two-step process for any error:\n1. Read the first line — it tells you what went wrong and usually where\n2. Paste it into your AI tool or Google — 90% of errors are well-documented",
   keyTerm:"Hydration mismatch",keyTermDef:"A Next.js error where the HTML generated on the server differs from what React tries to render in the browser. Common cause: browser extensions modifying the DOM, or code that behaves differently server-side vs client-side.",
   rec:"Never stare at an error alone. Read line 1, then paste the full error into Claude or your AI tool. Learning to recognize these 8 patterns covers the vast majority of what you'll encounter.",
   tables:[
    {title:"Frontend errors",headers:["Error","Meaning","Fix"],rows:[["Cannot read properties of undefined","Data hasn't loaded yet — you're accessing a property before it exists","Add a loading check: if (data) { ... } before accessing data"],["Module not found","Import path is wrong, or the package isn't installed","Check for typos in the import path; run npm install [package-name]"],["Hydration mismatch","Server-generated HTML differs from what React renders in the browser","Common in Next.js — usually browser extensions or server/client code mismatch"],["Too many re-renders","Infinite update loop — the component keeps re-rendering itself","State update is in the component body, not inside an event handler"]]},
    {title:"Backend and build errors",headers:["Error","Meaning","Fix"],rows:[["ECONNREFUSED","Cannot connect to the database or service at the specified address","Check your connection URL in .env; make sure the database service is running"],["Port already in use","Another process is already using that port number","Kill the other process or change the port in your config"],["CORS error","Browser blocked a request from one domain to another (cross-origin)","Configure CORS headers on your backend to allow your frontend's domain"],["npm ERR! peer dep","Package version conflict between dependencies","Try: npm install --legacy-peer-deps"]]}
   ],
   quizzes:[
    {q:"You see 'Cannot read properties of undefined' in your React app. What does this mean and how do you fix it?",opts:["A package is missing — run npm install","Data hasn't loaded yet and you're trying to access it before it exists — add a loading check: if (data) { ... }","There's an infinite loop — move state update to an event handler","The server can't be reached — check your connection URL"],a:1,exp:"'Cannot read properties of undefined: Data hasn't loaded yet → Add a loading check: if (data) { ... }' This is one of the most common React errors — you're trying to read a property of something undefined because it hasn't been fetched or set yet."},
    {q:"A 'CORS error' appears in your browser console. Where is the fix — frontend or backend?",opts:["Frontend — add headers to your fetch() requests","Backend — configure CORS headers to allow your frontend's domain","Both — CORS must be configured on both ends simultaneously","Neither — CORS is a browser setting the user must change"],a:1,exp:"'CORS error: Browser blocked cross-domain request → Configure CORS headers on backend.' CORS is a server-side configuration. The backend must explicitly allow requests from your frontend's domain."},
    {q:"You see 'Hydration mismatch' in a Next.js project. What does this mean?",opts:["Your database query returned unexpected data","The HTML generated on the server differs from what React renders in the browser — often caused by browser extensions or server/client code differences","Your CSS failed to load","Your TypeScript types don't match between frontend and backend"],a:1,exp:"'Hydration mismatch: Server HTML differs from client render → Common in Next.js; usually browser extensions or server/client code mismatch.' Hydration is when React takes server-generated HTML and makes it interactive — a mismatch means the server and client disagree."},
    {q:"'ECONNREFUSED' appears when you run your app locally. What does it mean?",opts:["A package failed to install — delete node_modules and run npm install","Cannot connect to the database or service — check your connection URL in .env and make sure the database is running","Too many connections to the server — reduce API requests","Your code has a syntax error — read the stack trace"],a:1,exp:"'ECONNREFUSED: Cannot connect to database or service → Check connection URL and that service is running.' Your app tried to connect to an address and nothing answered — either your DATABASE_URL in .env is wrong, or the database service isn't running."},
    {q:"The handbook's Golden Rule for error messages. What is it?",opts:["Fix the last line of the error first — that's where the root cause is","Read the FIRST line carefully, then copy it into Google or your AI tool — 90% of errors have been solved by others","Always restart your dev server before debugging","Delete node_modules and reinstall before reading any error message"],a:1,exp:"'The Golden Rule: Read the FIRST line of the error carefully. Copy it into Google or your AI tool. 90% of errors have been encountered and solved by others before you.' The first line names the error type — don't skip it."},
   ]},
  {id:19,title:"Understanding project structure",subtitle:"What all those files and folders are",
   granola:"When Granola engineers clone the repo, they immediately know where everything lives. This knowledge lets you direct your AI precisely — 'add this to the components folder' produces cleaner results than vague instructions.",
   content:"When AI generates a project, it creates many files. Understanding what each does lets you navigate any vibecoded project.\n\nROOT CONFIGURATION FILES (see table below)\n\nCOMMON NEXT.JS FOLDER LAYOUT (see table below)\n\nCRITICAL RULES:\n• The .env / .env.local file stores secret environment variables. NEVER commit to Git. Add it to .gitignore BEFORE your first commit.\n• The node_modules folder contains all downloaded packages — can be hundreds of MB. NEVER edit it. NEVER commit it. If it breaks: delete it and run 'npm install'.\n\nHOW TO FIX 90% OF BROKEN PROJECTS:\n1. Read the first line of the error\n2. Delete node_modules and run npm install\n3. Clear .next or dist folders (build output)\n4. Restart the dev server (Ctrl+C, then npm run dev)\n5. Paste the error into your AI tool or Google",
   keyTerm:".env file",keyTermDef:"A file storing secret environment variables — database URLs, API keys, auth secrets. NEVER commit to Git. Always add to .gitignore before commit #1. If someone gets this file, they have access to all your services.",
   rec:"Learn this structure before making changes. Tell the AI which folder new code belongs in — this produces cleaner results. And always: .env goes in .gitignore before your very first commit.",
   tables:[
    {title:"Root configuration files",headers:["File","Purpose"],rows:[["package.json","Project ID card: name, dependencies, scripts (npm run dev, npm run build)"],["tsconfig.json","TypeScript settings: strictness, targets, paths"],[".env / .env.local","Secret environment variables (database URLs, API keys). NEVER commit to Git."],[".gitignore","Lists files Git should never track (node_modules, .env, build output)"],["tailwind.config.js","Tailwind CSS customization: custom colors, fonts, spacing"],["next.config.js","Next.js settings (if using Next.js)"],["drizzle.config.ts","Drizzle ORM settings (if using Drizzle)"]]},
    {title:"Common Next.js folder layout",headers:["Folder","Contains"],rows:[["app/","Pages and layouts. Each subfolder = a route. app/about/page.tsx = /about"],["app/api/","Backend API routes. app/api/users/route.ts handles /api/users"],["components/","Reusable UI components (buttons, cards, forms, navigation)"],["lib/","Utility functions, database client, helper code"],["public/","Static files (images, fonts) served directly to the browser"],["db/ or drizzle/","Database schema and migration files"]]}
   ],
   quizzes:[
    {q:"In a Next.js project, where do you put a new page at the URL '/dashboard'?",opts:["In components/ as Dashboard.tsx","In public/ as dashboard.html","In app/ as app/dashboard/page.tsx — file-based routing creates the route automatically","In app/api/ as app/api/dashboard/route.ts"],a:2,exp:"From the folder layout: 'app/: Pages and layouts. Each subfolder = a route. app/about/page.tsx = /about.' By the same pattern, app/dashboard/page.tsx automatically creates the /dashboard route."},
    {q:"Where do you put a new backend API endpoint at '/api/meetings' in a Next.js project?",opts:["In lib/ as meetings.ts","In components/ as MeetingsAPI.tsx","In app/api/ as app/api/meetings/route.ts","In public/ as api/meetings.json"],a:2,exp:"From the folder layout: 'app/api/: Backend API routes. app/api/users/route.ts handles /api/users.' By the same pattern, app/api/meetings/route.ts handles /api/meetings."},
    {q:"What is the difference between the 'components/' folder and the 'lib/' folder?",opts:["components/ is for TypeScript; lib/ is for JavaScript","components/ is for reusable UI elements (buttons, cards, forms); lib/ is for utility functions, database client, and helper code","components/ is for frontend code; lib/ is for backend code only","There is no meaningful difference"],a:1,exp:"'components/: Reusable UI components (buttons, cards, forms, navigation)' vs 'lib/: Utility functions, database client, helper code.' UI components go in components/, non-UI shared logic goes in lib/."},
    {q:"Your Next.js project is broken. You've tried restarting the dev server. What is step 2 in the handbook's 5-step fix checklist?",opts:["Clear .next or dist build output folders","Paste the error into your AI tool","Delete node_modules and run npm install","Read the first line of the error"],a:2,exp:"The 5-step checklist: (1) Read the first line of the error. (2) Delete node_modules and run npm install. (3) Clear .next or dist folders. (4) Restart the dev server. (5) Paste error into AI/Google. Step 2 is 'Delete node_modules and run npm install.'"},
    {q:"What does the 'public/' folder contain — and how are files in it accessed?",opts:["Private API credentials and secrets","Database migration scripts","Static files (images, fonts) served directly to the browser at the root URL (e.g., /logo.png)","TypeScript utility functions shared across the app"],a:2,exp:"'public/: Static files (images, fonts) served directly to browser.' Files in /public are accessible at the root URL — an image at public/logo.png is available at yoursite.com/logo.png. They are NOT processed by the build tool."},
   ]},
  {id:20,title:"Frequently asked questions",subtitle:"Answers to the questions everyone asks",
   granola:"The handbook closes with the questions non-technical users ask most often. These are the distilled 'what do I actually need to know' answers — your quick reference for the most common confusions.",

// STATE
let cur=0, view='lesson', completed={}, quizState={}, qIdx={};

function mk(){return String(MODULES[cur].id);}
function cqi(){return qIdx[mk()]??0;}
function qk(){return mk()+'_'+cqi();}
function qa(){return quizState[qk()]||{};}
function mod(){return MODULES[cur];}

// RENDER NAV
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  MODULES.forEach((m,i)=>{
    const isDone=!!completed[String(m.id)];
    const isActive=i===cur;
    const btn=document.createElement('button');
    btn.className='nav-btn'+(isActive?' active':'');
    btn.onclick=()=>goTo(i);
    const dot=document.createElement('div');
    dot.className='nav-dot'+(isDone?' done':isActive?' active':'');
    dot.textContent=isDone?'✓':String(m.id);
    const lbl=document.createElement('div');
    lbl.className='nav-label';
    lbl.textContent=m.title;
    btn.appendChild(dot);btn.appendChild(lbl);
    nav.appendChild(btn);
  });
  const done=Object.keys(completed).length;
  const pct=Math.round((done/MODULES.length)*100);
  document.getElementById('sidebar-progress-label').textContent=`${done}/${MODULES.length} complete · ${pct}%`;
  document.getElementById('progress-fill').style.width=pct+'%';
}

// RENDER TABLES
function renderTables(tables){
  const c=document.getElementById('tables-container');
  c.innerHTML='';
  (tables||[]).forEach(t=>{
    const wrap=document.createElement('div');wrap.className='table-wrap';
    const title=document.createElement('div');title.className='table-title';title.textContent=t.title;
    const tbl=document.createElement('table');
    const thead=document.createElement('thead');const tr=document.createElement('tr');
    t.headers.forEach(h=>{const th=document.createElement('th');th.textContent=h;tr.appendChild(th);});
    thead.appendChild(tr);tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    t.rows.forEach(row=>{
      const tr2=document.createElement('tr');
      row.forEach(cell=>{const td=document.createElement('td');td.textContent=cell;tr2.appendChild(td);});
      tbody.appendChild(tr2);
    });
    tbl.appendChild(tbody);wrap.appendChild(title);wrap.appendChild(tbl);c.appendChild(wrap);
  });
}

// RENDER LESSON
function renderLesson(){
  const m=mod();
  document.getElementById('chapter-label').textContent=`Chapter ${m.id} of ${MODULES.length}`;
  document.getElementById('chapter-title').textContent=m.title;
  document.getElementById('chapter-subtitle').textContent=m.subtitle;
  document.getElementById('quiz-tab-btn').textContent=`Quiz (${m.quizzes.length} questions)`;
  document.getElementById('granola-text').textContent=m.granola;
  document.getElementById('lesson-content').textContent=m.content;
  renderTables(m.tables);
  const recBox=document.getElementById('rec-box');
  if(m.rec){recBox.style.display='';document.getElementById('rec-text').textContent=m.rec;}
  else recBox.style.display='none';
  document.getElementById('key-term-name').textContent=m.keyTerm;
  document.getElementById('key-term-def').textContent=m.keyTermDef;
  document.getElementById('ask-claude-btn').style.display='';
  document.getElementById('claude-box').style.display='none';
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('quiz-btn').textContent=`Take quiz (${m.quizzes.length} questions) →`;
}

// RENDER QUIZ
function renderQuiz(){
  const m=mod();const qi=cqi();const q=m.quizzes[qi];const qas=qa();
  // dots
  const dotsEl=document.getElementById('q-dots');dotsEl.innerHTML='';
  m.quizzes.forEach((_,i)=>{
    const k=mk()+'_'+i;const s=quizState[k];const isA=i===qi;
    const d=document.createElement('div');
    d.className='q-dot'+(s?.answered?(s.correct?' correct':' wrong'):isA?' active':'');
    d.onclick=()=>{qIdx[mk()]=i;renderQuiz();};
    dotsEl.appendChild(d);
  });
  const counter=document.createElement('div');counter.id='q-counter';counter.textContent=`${qi+1}/${m.quizzes.length}`;
  dotsEl.appendChild(counter);
  // question
  document.getElementById('q-text').textContent=q.q;
  // options
  const optsEl=document.getElementById('q-options');optsEl.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='q-opt'+(qas.answered?' answered':'');
    if(qas.answered){
      if(i===q.a)btn.classList.add('correct');
      else if(i===qas.selected&&!qas.correct)btn.classList.add('wrong');
    }
    btn.textContent=opt;
    btn.onclick=()=>selectAnswer(i);
    optsEl.appendChild(btn);
  });
  // feedback
  const fb=document.getElementById('q-feedback');
  if(qas.answered){
    fb.className='q-feedback '+(qas.correct?'correct':'wrong');
    document.getElementById('q-feedback-title').textContent=qas.correct?'Correct!':'Not quite.';
    document.getElementById('q-feedback-exp').textContent=q.exp;
  }else{fb.className='q-feedback';fb.style.display='none';}
  // buttons
  const allAnswered=m.quizzes.every((_,i)=>quizState[mk()+'_'+i]?.answered);
  document.getElementById('next-q-btn').style.display=(qas.answered&&qi<m.quizzes.length-1)?'':'none';
  document.getElementById('next-ch-btn').style.display=(allAnswered&&cur<MODULES.length-1)?'':'none';
  document.getElementById('complete-msg').style.display=(allAnswered&&cur===MODULES.length-1)?'':'none';
}

function selectAnswer(i){
  if(qa().answered)return;
  const m=mod();const qi=cqi();const q=m.quizzes[qi];
  const correct=i===q.a;
  quizState[qk()]={selected:i,answered:true,correct};
  const allNowCorrect=m.quizzes.every((_,idx)=>{
    if(idx===qi)return correct;
    return quizState[mk()+'_'+idx]?.correct;
  });
  if(allNowCorrect)completed[mk()]=true;
  renderNav();renderQuiz();
}

function nextQuestion(){
  const m=mod();const qi=cqi();
  if(qi<m.quizzes.length-1){qIdx[mk()]=qi+1;renderQuiz();}
}

function nextChapter(){
  if(cur<MODULES.length-1)goTo(cur+1);
}

function prevChapter(){
  if(cur>0)goTo(cur-1);
}

function goTo(i){
  cur=i;
  if(!qIdx[String(MODULES[i].id)])qIdx[String(MODULES[i].id)]=0;
  setView('lesson');
  renderNav();
}

function setView(v){
  view=v;
  document.getElementById('lesson-view').style.display=v==='lesson'?'':'none';
  document.getElementById('quiz-view').style.display=v==='quiz'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(v==='lesson'?0:1)));
  if(v==='lesson')renderLesson();
  else renderQuiz();
}

async function askClaude(){
  const m=mod();
  document.getElementById('ask-claude-btn').style.display='none';
  const box=document.getElementById('claude-box');box.style.display='';
  const textEl=document.getElementById('claude-text');textEl.textContent='Thinking...';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:'You are a vibecoding tutor for non-technical staff at Granola, an AI meeting notes startup in London. Explain concepts in plain English, always connecting them to how Granola works as a real product. Reference specific details from the Vibe Coder\'s Handbook (March 2026 Edition). Keep answers to 3-4 short paragraphs. No code unless asked.',
      messages:[{role:'user',content:`Chapter: "${m.title}" — ${m.subtitle}\nGranola context: ${m.granola}\nHandbook rec: ${m.rec||'General chapter'}\n\nGive me a deeper, practical explanation of this chapter as it applies to Granola specifically.`}]
    })});
    const data=await res.json();
    textEl.textContent=data.content?.find(b=>b.type==='text')?.text||'No response.';
  }catch(e){textEl.textContent='Something went wrong. Try again.';}
}

function openGlossary(){
  const list=document.getElementById('glossary-list');list.innerHTML='';
  MODULES.forEach(m=>{
    const item=document.createElement('div');item.className='gloss-item';
    const term=document.createElement('div');term.className='gloss-term';term.textContent=m.keyTerm;
    const def=document.createElement('div');def.className='gloss-def';def.textContent=m.keyTermDef;
    item.appendChild(term);item.appendChild(def);list.appendChild(item);
  });
  document.getElementById('overlay').classList.add('open');
}

function closeGlossary(){
  document.getElementById('overlay').classList.remove('open');
}

// INIT
renderNav();
renderLesson();
</script>
</body>
</html>
